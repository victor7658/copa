<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA 2026 - ELENCOS OFICIAIS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:35px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

/* TIMES */

.teams{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.team{
    background:#0f172a;
    padding:14px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.team:hover{
    transform:scale(1.05);
    background:#111c33;
}

/* JANELA */

.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:600px;
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    display:none;
    z-index:10;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

/* FUNDO ESCURO */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:5;
}

/* BOTÃO X */

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
    color:#facc15;
}

/* LISTA */

h2{
    color:#38bdf8;
    margin-bottom:10px;
}

ul{
    list-style:none;
}

li{
    padding:5px 0;
    color:#cbd5e1;
}

/* MURAL */

input, textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
    margin-top:10px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.post{
    background:#0f172a;
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    border-left:4px solid #facc15;
}

.post h4{
    color:#facc15;
}

.post p{
    color:#cbd5e1;
    margin-top:5px;
}

</style>

</head>

<body>

<header>
<h1>🏆 COPA 2026 - ELENCOS</h1>
</header>

<div class="container">

<div class="teams">

<div class="team" onclick="openTeam('brasil')">🇧🇷 Brasil</div>
<div class="team" onclick="openTeam('marrocos')">🇲🇦 Marrocos</div>
<div class="team" onclick="openTeam('haiti')">🇭🇹 Haiti</div>
<div class="team" onclick="openTeam('escocia')">🏴 Escócia</div>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeTeam()"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="close" onclick="closeTeam()">✖</div>

<h2 id="teamName"></h2>

<ul id="players"></ul>

</div>

<br><br>

<!-- MURAL -->

<h2 style="color:#38bdf8;">💬 Mural da Copa</h2>

<input type="text" id="name" placeholder="Seu nome">
<textarea id="comment" rows="3" placeholder="Escreva sua opinião..."></textarea>

<button onclick="addComment()">PUBLICAR</button>

<div id="posts"></div>

</div>

<script>

/* ELENCO BRASIL (SEU LISTADO) */

const squads = {

brasil:{
name:"🇧🇷 Brasil - Convocados 2026",
players:[

"Goleiros",
"Alisson (Liverpool)",
"Ederson (Fenerbahçe)",
"Weverton (Grêmio)",

"Defensores",
"Alex Sandro (Flamengo)",
"Bremer (Juventus)",
"Danilo (Flamengo)",
"Douglas Santos (Zenit)",
"Gabriel Magalhães (Arsenal)",
"Ibañez (Al-Ahli)",
"Léo Pereira (Flamengo)",
"Marquinhos (PSG)",
"Wesley (Roma)",

"Meio-campistas",
"Bruno Guimarães (Newcastle)",
"Casemiro (Manchester United)",
"Danilo Santos (Botafogo)",
"Fabinho (Al-Ittihad)",
"Lucas Paquetá (Flamengo)",

"Atacantes",
"Endrick (Lyon)",
"Gabriel Martinelli (Arsenal)",
"Igor Thiago (Brentford)",
"Luiz Henrique (Zenit)",
"Matheus Cunha (Manchester United)",
"Neymar (Santos)",
"Raphinha (Barcelona)",
"Rayan (Bournemouth)"

]
},

marrocos:{
name:"🇲🇦 Marrocos",
players:[
"Bono (GK)",
"Hakimi",
"Ziyech",
"En-Nesyri",
"Amrabat"
]
},

haiti:{
name:"🇭🇹 Haiti",
players:[
"Placide",
"Pierrot",
"Joseph",
"Jean"
]
},

escocia:{
name:"🏴 Escócia",
players:[
"Robertson",
"McTominay",
"Tierney",
"McGinn"
]
}

};

/* ABRIR TIME */

function openTeam(team){

document.getElementById('modal').style.display = "block";
document.getElementById('overlay').style.display = "block";

document.getElementById('teamName').innerText =
squads[team].name;

let list = document.getElementById('players');
list.innerHTML = "";

squads[team].players.forEach(p =>{

let li = document.createElement("li");
li.innerText = "⚽ " + p;
list.appendChild(li);

});

}

/* FECHAR */

function closeTeam(){

document.getElementById('modal').style.display = "none";
document.getElementById('overlay').style.display = "none";

}

/* MURAL */

function addComment(){

let name = document.getElementById('name').value;
let comment = document.getElementById('comment').value;

if(name === "" || comment === ""){
alert("Preencha tudo!");
return;
}

let post = document.createElement("div");
post.classList.add("post");

post.innerHTML = `
<h4>${name}</h4>
<p>${comment}</p>
`;

document.getElementById("posts").prepend(post);

document.getElementById("name").value = "";
document.getElementById("comment").value = "";

}

</script>

</body>
</html>
