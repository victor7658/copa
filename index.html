<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA DO MUNDO 4K - TORNEIO & OPINIÕES</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:35px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:60px;
    color:#facc15;
    text-shadow:0 0 25px #facc15;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

/* LAYOUT */

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding-bottom:50px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:20px;
    backdrop-filter:blur(10px);
}

/* TITULO */

.card h2{
    color:#38bdf8;
    margin-bottom:15px;
}

/* TIMES */

.team{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0f172a;
    padding:12px;
    border-radius:15px;
    margin-bottom:10px;
}

.flag{
    font-size:30px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.play{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.play:hover{
    transform:scale(1.03);
}

/* RESULTADO JOGO */

.match{
    background:#0f172a;
    padding:20px;
    border-radius:20px;
    text-align:center;
    margin-top:10px;
}

.score{
    font-size:40px;
    color:#facc15;
    font-weight:bold;
}

/* MURAL */

textarea,input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
    margin-bottom:10px;
    outline:none;
}

.post-btn{
    background:linear-gradient(90deg,#38bdf8,#22c55e);
    color:black;
}

.post{
    background:#0f172a;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
    border-left:4px solid #facc15;
}

.post h3{
    color:#facc15;
    font-size:16px;
}

.post p{
    color:#cbd5e1;
    margin-top:5px;
}

</style>

</head>

<body>

<header>

<h1>🏆 COPA DO MUNDO 4K</h1>

<p>Torneio oficial + mural de opiniões da comunidade</p>

</header>

<div class="container">

<div class="grid">

<!-- TORNEIO -->

<div class="card">

<h2>⚽ Times do Torneio</h2>

<div class="team">🇧🇷 Brasil <b>99</b></div>
<div class="team">🇲🇦 Marrocos <b>90</b></div>
<div class="team">🇭🇹 Haiti <b>82</b></div>
<div class="team">🏴 Escócia <b>88</b></div>

<button class="play" onclick="playMatch()">
SIMULAR PARTIDA
</button>

<div class="match" id="match">

<h3 id="teams">Brasil vs Marrocos</h3>
<div class="score" id="score">0 X 0</div>
<p id="winner">Clique para jogar!</p>

</div>

</div>

<!-- MURAL -->

<div class="card">

<h2>💬 Mural da Copa</h2>

<input type="text" id="name" placeholder="Seu nome">
<textarea id="comment" rows="4" placeholder="Escreva sua opinião sobre a Copa..."></textarea>

<button class="post-btn" onclick="addComment()">
PUBLICAR
</button>

<div id="posts"></div>

</div>

</div>

</div>

<script>

/* TIMES */

const teams = [
    "Brasil 🇧🇷",
    "Marrocos 🇲🇦",
    "Haiti 🇭🇹",
    "Escócia 🏴"
];

let i = 0;
let j = 1;

/* PARTIDA */

function playMatch(){

    let score1 = Math.floor(Math.random()*6);
    let score2 = Math.floor(Math.random()*6);

    document.getElementById('teams').innerHTML =
    teams[i] + " VS " + teams[j];

    document.getElementById('score').innerHTML =
    score1 + " X " + score2;

    let result = "";

    if(score1 > score2){
        result = "🏆 " + teams[i] + " venceu!";
    }
    else if(score2 > score1){
        result = "🏆 " + teams[j] + " venceu!";
    }
    else{
        result = "😱 Empate histórico!";
    }

    document.getElementById('winner').innerHTML = result;

    j++;

    if(j >= teams.length){
        i++;
        j = i + 1;
    }

    if(i >= teams.length - 1){
        i = 0;
        j = 1;
    }

}

/* MURAL */

function addComment(){

    let name = document.getElementById('name').value;
    let comment = document.getElementById('comment').value;

    if(name === '' || comment === ''){
        alert('Preencha tudo!');
        return;
    }

    let div = document.createElement('div');
    div.classList.add('post');

    div.innerHTML = `
        <h3>${name}</h3>
        <p>${comment}</p>
    `;

    document.getElementById('posts').prepend(div);

    document.getElementById('name').value = '';
    document.getElementById('comment').value = '';

}

</script>

</body>
</html>
