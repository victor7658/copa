<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b3d0b;
    color:white;
}

/* HEADER */

header{
    background:linear-gradient(90deg,#006400,#00aa44);
    padding:25px;
    text-align:center;
}

header h1{
    font-size:3rem;
    color:#ffdf00;
}

header p{
    margin-top:10px;
}

/* MENU */

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.team-btn{
    padding:14px 25px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    font-weight:700;
    transition:0.3s;
    color:white;
}

/* CORES */

.brasil{background:#009933;}
.argentina{background:#4bb3ff;}
.franca{background:#0044ff;}
.portugal{background:#c70000;}
.inglaterra{background:#666;}

/* BOTÃO ATIVO */

.team-btn.active{
    background:white !important;
    color:black !important;
    transform:scale(1.1);
    border:3px solid #ffdf00;
}

/* CAMPO */

.field{
    width:95%;
    max-width:1300px;
    height:850px;
    margin:20px auto;
    position:relative;
    border:6px solid white;
    border-radius:25px;
    overflow:hidden;
    background:url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1400&auto=format&fit=crop') center/cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

/* JOGADORES */

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    text-align:center;
    transition:0.3s;
}

.player:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.shirt{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffdf00;
    border:4px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.3rem;
    font-weight:700;
    color:#006400;
    margin:auto;
}

.player h3{
    margin-top:8px;
    font-size:1rem;
}

.player p{
    font-size:0.8rem;
    color:#ddd;
}

/* RESPONSIVO */

@media(max-width:900px){

.field{
    height:1200px;
}

.shirt{
    width:70px;
    height:70px;
    font-size:1rem;
}

header h1{
    font-size:2rem;
}

}

</style>
</head>
<body>

function showTeam(team,element){

const playersDiv = document.getElementById("players");

playersDiv.innerHTML = "";

/* REMOVE ACTIVE */

document.querySelectorAll(".team-btn").forEach(btn=>{
btn.classList.remove("active");
});

/* ADD ACTIVE */

element.classList.add("active");

/* MOSTRA JOGADORES */

teams[team].forEach(player=>{

playersDiv.innerHTML += `

<div class="player"
style="top:${player.top}; left:${player.left};">

<div class="shirt">${player.num}</div>

<h3>${player.name}</h3>

<p>${player.pos}</p>

</div>

`;

});

}
