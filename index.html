<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MURAL DA COPA DO MUNDO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:60px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:25px;
    backdrop-filter:blur(10px);
}

/* TIMES */

.teams{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

.team{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
}

/* INPUTS */

input, textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-bottom:10px;
    background:#0f172a;
    color:white;
    outline:none;
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

/* POSTS */

.post{
    background:#0f172a;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
    border-left:4px solid #facc15;
}

.post h3{
    color:#facc15;
}

.post p{
    margin-top:5px;
    color:#cbd5e1;
}

/* AÇÕES */

.actions{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
    padding:10px;
    font-size:13px;
}

/* BOTÕES DIFERENTES */

.edit{
    background:linear-gradient(90deg,#38bdf8,#0ea5e9);
}

.delete{
    background:linear-gradient(90deg,#ef4444,#dc2626);
}

</style>

</head>

<body>

<header>

<h1>🏆 MURAL DA COPA</h1>

<p>Brasil, Marrocos, Haiti e Escócia — opinião da comunidade</p>

</header>

<div class="container">

<div class="card">

<!-- TIMES -->

<div class="teams">

<div class="team">🇧🇷 Brasil</div>
<div class="team">🇲🇦 Marrocos</div>
<div class="team">🇭🇹 Haiti</div>
<div class="team">🏴 Escócia</div>

</div>

<!-- FORM -->

<input type="text" id="name" placeholder="Seu nome">
<textarea id="comment" rows="4" placeholder="Escreva sua opinião sobre a Copa..."></textarea>

<button onclick="addComment()">
PUBLICAR OPINIÃO
</button>

<!-- POSTS -->

<div id="posts"></div>

</div>

</div>

<script>

/* ADICIONAR COMENTÁRIO */

function addComment(){

    let name = document.getElementById('name').value;
    let comment = document.getElementById('comment').value;

    if(name === '' || comment === ''){
        alert('Preencha tudo!');
        return;
    }

    let post = document.createElement('div');
    post.classList.add('post');

    post.innerHTML = `
        <h3>${name}</h3>
        <p class="text">${comment}</p>

        <div class="actions">

            <button class="edit" onclick="editComment(this)">
                ✏️ Editar
            </button>

            <button class="delete" onclick="deleteComment(this)">
                🗑️ Excluir
            </button>

        </div>
    `;

    document.getElementById('posts').prepend(post);

    document.getElementById('name').value = '';
    document.getElementById('comment').value = '';

}

/* EXCLUIR */

function deleteComment(btn){
    btn.parentElement.parentElement.remove();
}

/* EDITAR */

function editComment(btn){

    let post = btn.parentElement.parentElement;
    let textElement = post.querySelector('.text');

    let newText = prompt('Edite seu comentário:', textElement.innerText);

    if(newText !== null && newText !== ''){
        textElement.innerText = newText;
    }

}

</script>

</body>
</html>
