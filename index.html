<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESAFIO DOS PÊNALTIS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* FUNDO */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 30%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 30%),
    linear-gradient(135deg,#020617,#071426);
    z-index:-2;
}

/* HEADER */

header{
    text-align:center;
    padding:25px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
}

@media(max-width:1000px){

    .container{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:25px;
    backdrop-filter:blur(10px);
}

/* INPUTS */

.card h2{
    margin-bottom:20px;
    color:#38bdf8;
}

.input-box{
    margin-bottom:16px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    font-size:15px;
    outline:none;
}

/* BOTÕES */

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    margin-top:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.start{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.start:hover{
    transform:scale(1.03);
}

.kick{
    background:linear-gradient(90deg,#facc15,#f59e0b);
    color:black;
}

.kick:hover{
    transform:scale(1.03);
}

/* CAMPO */

.field{
    position:relative;
    height:750px;
    border-radius:30px;
    overflow:hidden;
    border:5px solid white;
    background:
    repeating-linear-gradient(
        to bottom,
        #16a34a 0px,
        #16a34a 90px,
        #15803d 90px,
        #15803d 180px
    );
}

/* PLACAR */

.score{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#020617dd;
    padding:15px 35px;
    border-radius:20px;
    font-size:35px;
    color:#facc15;
    font-weight:bold;
    z-index:5;
}

/* GOL */

.goal{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:220px;
    border:8px solid white;
    border-bottom:none;
}

/* GOLEIRO */

.goalkeeper{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    font-size:90px;
    transition:0.5s;
}

/* BOLA */

.ball{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:45px;
    transition:1s;
}

/* JOGADOR */

.player{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:100px;
}

/* DIREÇÕES */

.controls{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
}

.controls button{
    width:90px;
    padding:14px;
}

/* RESULTADO */

.result{
    margin-top:20px;
    text-align:center;
    padding:18px;
    border-radius:18px;
    background:#0f172a;
    display:none;
}

.result h3{
    font-size:28px;
    color:#facc15;
}

.result p{
    margin-top:10px;
    color:#cbd5e1;
}

/* TORCIDA */

.crowd{
    position:absolute;
    width:100%;
    top:0;
    text-align:center;
    font-size:35px;
    background:#111827;
    padding:10px;
    letter-spacing:10px;
}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<h1>🏆 DESAFIO DOS PÊNALTIS</h1>

<p>
Você consegue ganhar a final da Copa do Mundo?
</p>

</header>

<div class="container">

<!-- MENU -->

<div class="card">

<h2>⚽ CONFIGURAÇÃO</h2>

<div class="input-box">
<label>Nome da Seleção</label>
<input type="text" id="team" placeholder="Brasil">
</div>

<div class="input-box">
<label>Adversário</label>

<select id="enemy">
<option>Argentina</option>
<option>França</option>
<option>Alemanha</option>
<option>Portugal</option>
<option>Espanha</option>
</select>

</div>

<button class="start" onclick="startGame()">
🔥 COMEÇAR FINAL
</button>

<h2 style="margin-top:30px;">🎯 CHUTAR</h2>

<button class="kick" onclick="kick('left')">
⬅ ESQUERDA
</button>

<button class="kick" onclick="kick('center')">
⬆ CENTRO
</button>

<button class="kick" onclick="kick('right')">
➡ DIREITA
</button>

<div class="result" id="result">

<h3 id="title"></h3>

<p id="message"></p>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<div class="field">

<div class="crowd">
🎉 ⚽ 🏆 🔥 🥁 ⚽ 🎉
</div>

<div class="score" id="score">
0 X 0
</div>

<div class="goal"></div>

<div class="goalkeeper" id="goalkeeper">
🧤
</div>

<div class="ball" id="ball">
⚽
</div>

<div class="player">
🧍
</div>

</div>

</div>

</div>

<script>

let playerGoals = 0;
let enemyGoals = 0;
let rounds = 0;

function startGame(){

    playerGoals = 0;
    enemyGoals = 0;
    rounds = 0;

    document.getElementById('score').innerHTML =
    '0 X 0';

    document.getElementById('result').style.display =
    'none';

    resetBall();

}

/* RESETAR BOLA */

function resetBall(){

    let ball =
    document.getElementById('ball');

    ball.style.left = '50%';
    ball.style.bottom = '120px';

}

/* CHUTE */

function kick(direction){

    if(rounds >= 5){

        finishGame();
        return;
    }

    let ball =
    document.getElementById('ball');

    let keeper =
    document.getElementById('goalkeeper');

    let keeperMove =
    ['left','center','right']
    [Math.floor(Math.random()*3)];

    keeper.style.left = '50%';

    /* MOVIMENTO GOLEIRO */

    if(keeperMove === 'left'){
        keeper.style.left = '35%';
    }

    if(keeperMove === 'right'){
        keeper.style.left = '65%';
    }

    /* MOVIMENTO BOLA */

    ball.style.bottom = '500px';

    if(direction === 'left'){
        ball.style.left = '35%';
    }

    if(direction === 'center'){
        ball.style.left = '50%';
    }

    if(direction === 'right'){
        ball.style.left = '65%';
    }

    setTimeout(() => {

        if(direction !== keeperMove){

            playerGoals++;

            showMessage(
            '⚽ GOOOOOL!',
            'A torcida foi à loucura!'
            );

        }

        else{

            showMessage(
            '🧤 DEFENDEU!',
            'O goleiro salvou o adversário!'
            );

        }

        /* ADVERSÁRIO */

        let enemyChance =
        Math.random();

        if(enemyChance > 0.4){

            enemyGoals++;

        }

        rounds++;

        document.getElementById('score').innerHTML =
        playerGoals + ' X ' + enemyGoals;

        resetBall();

        if(rounds >= 5){

            finishGame();

        }

    },1000);

}

/* RESULTADO */

function showMessage(title,msg){

    document.getElementById('result').style.display =
    'block';

    document.getElementById('title').innerHTML =
    title;

    document.getElementById('message').innerHTML =
    msg;

}

/* FINAL */

function finishGame(){

    let team =
    document.getElementById('team').value || 'Seu Time';

    let enemy =
    document.getElementById('enemy').value;

    if(playerGoals > enemyGoals){

        showMessage(
        '🏆 CAMPEÃO DO MUNDO!',
        team + ' venceu ' + enemy +
        ' nos pênaltis e conquistou a Copa!'
        );

    }

    else if(playerGoals < enemyGoals){

        showMessage(
        '💔 VICE-CAMPEÃO',
        enemy + ' venceu a disputa de pênaltis.'
        );

    }

    else{

        showMessage(
        '😱 EMPATE HISTÓRICO',
        'A final terminou empatada após os pênaltis.'
        );

    }

}

</script>

</body>
</html>
