<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MURAL DA COPA DO MUNDO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:60px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
}

/* LAYOUT */

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
    padding-bottom:60px;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    padding:25px;
    backdrop-filter:blur(10px);
}

/* INPUTS */

.input-box{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
}

input, textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#0f172a;
    color:white;
    font-size:15px;
    outline:none;
    resize:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    margin-top:10px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* POSTS */

.posts{
    margin-top:30px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.post{
    background:#0f172a;
    padding:18px;
    border-radius:18px;
    border-left:4px solid #facc15;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.post h3{
    color:#facc15;
    font-size:18px;
}

.post p{
    margin-top:8px;
    color:#cbd5e1;
    line-height:1.5;
}

/* TÍTULO MURAL */

.mural-title{
    text-align:center;
    margin-top:20px;
    font-size:22px;
    color:#38bdf8;
}

</style>

</head>

<body>

<header>

<h1>🏆 MURAL DA COPA</h1>

<p>Deixe sua opinião sobre a Copa do Mundo deste ano</p>

</header>

<div class="container">

<div class="card">

<h2>📝 Compartilhe sua opinião</h2>

<div class="input-box">
<label>Seu nome</label>
<input type="text" id="name" placeholder="Ex: João">
</div>

<div class="input-box">
<label>Sua opinião sobre a Copa</label>
<textarea id="text" rows="4" placeholder="Escreva sua opinião..."></textarea>
</div>

<button onclick="addPost()">
PUBLICAR OPINIÃO
</button>

<div class="mural-title">
🔥 Opiniões da comunidade
</div>

<div class="posts" id="posts">

<!-- POSTS AQUI -->

</div>

</div>

</div>

<script>

function addPost(){

    let name =
    document.getElementById('name').value;

    let text =
    document.getElementById('text').value;

    if(name === '' || text === ''){
        alert('Preencha todos os campos!');
        return;
    }

    let post =
    document.createElement('div');

    post.classList.add('post');

    post.innerHTML = `
        <h3>${name}</h3>
        <p>${text}</p>
    `;

    document.getElementById('posts')
    .prepend(post);

    document.getElementById('name').value = '';
    document.getElementById('text').value = '';

}

</script>

</body>
</html>
