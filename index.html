<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SUPER SIMULADOR DE TIME</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#00f5ff33,transparent 30%),
    radial-gradient(circle at bottom right,#00ff7b22,transparent 30%),
    linear-gradient(135deg,#020617,#0f172a);
    z-index:-2;
}

body::after{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#00f5ff;
    text-shadow:0 0 15px #00f5ff88;
}

header p{
    margin-top:15px;
    color:#cbd5e1;
    font-size:18px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1700px;
    margin:auto;
    padding-bottom:50px;
}

.layout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:30px;
}

@media(max-width:1200px){

    .layout{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.card h2{
    margin-bottom:25px;
    color:#00f5ff;
    font-size:30px;
}

/* FORM */

.input-box{
    margin-bottom:16px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
    font-size:14px;
}

input, select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

input:focus, select:focus{
    box-shadow:0 0 10px #00f5ff88;
}

/* BOTÃO */

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#06b6d4,#00ff88);
    color:#02111b;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #00ff8880;
}

/* CAMPO */

.field{
    position:relative;
    width:100%;
    height:950px;
    border-radius:30px;
    overflow:hidden;
    background:
    repeating-linear-gradient(
        to bottom,
        #15803d 0px,
        #15803d 90px,
        #166534 90px,
        #166534 180px
    );
    border:5px solid white;
}

/* LINHAS */

.mid-line{
    position:absolute;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.5);
    top:50%;
}

.center-circle{
    position:absolute;
    width:170px;
    height:170px;
    border:4px solid rgba(255,255,255,0.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* TIME */

.team-name{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#020617cc;
    padding:10px 25px;
    border-radius:20px;
    font-size:24px;
    font-weight:bold;
    color:#00f5ff;
}

/* JOGADORES */

.player{
    position:absolute;
    width:120px;
    padding:12px;
    border-radius:18px;
    text-align:center;
    background:#020617dd;
    border:2px solid rgba(255,255,255,0.2);
    transition:0.3s;
    font-size:13px;
}

.player:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #00f5ff55;
}

.player span{
    display:block;
    margin-top:6px;
    font-size:12px;
    color:#94a3b8;
}

/* POSIÇÕES */

.p1{top:90px;left:50%;transform:translateX(-50%);}
.p2{top:200px;left:15%;}
.p3{top:200px;right:15%;}

.p4{top:380px;left:10%;}
.p5{top:350px;left:50%;transform:translateX(-50%);}
.p6{top:380px;right:10%;}

.p7{bottom:240px;left:8%;}
.p8{bottom:210px;left:32%;}
.p9{bottom:210px;right:32%;}
.p10{bottom:240px;right:8%;}

.p11{
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:#082f49;
}

/* RESULTADO */

.result{
    margin-top:25px;
    background:#020617;
    border-radius:20px;
    padding:25px;
    display:none;
    text-align:center;
    border:1px solid rgba(255,255,255,0.1);
}

.result h3{
    font-size:35px;
    color:#facc15;
}

.result p{
    margin-top:15px;
    color:#cbd5e1;
    line-height:1.7;
}

.overall{
    margin-top:20px;
    font-size:65px;
    font-weight:bold;
    color:#00ff88;
    text-shadow:0 0 15px #00ff8880;
}

.stars{
    margin-top:15px;
    font-size:30px;
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

</style>
</head>
<body>

<header>

<h1>⚽ SUPER TEAM BUILDER</h1>

<p>
Monte um elenco completo e descubra o poder do seu time.
</p>

</header>

<div class="container">

<div class="layout">

<!-- PAINEL -->

<div class="card">

<h2>🔥 Criar Escalação</h2>

<div class="input-box">
<label>Nome do Time</label>
<input type="text" id="teamName" placeholder="Ex: Trovão FC">
</div>

<div class="input-box"><label>Centroavante</label><input type="text" id="j1"></div>
<div class="input-box"><label>Ponta Esquerda</label><input type="text" id="j2"></div>
<div class="input-box"><label>Ponta Direita</label><input type="text" id="j3"></div>

<div class="input-box"><label>Meia 1</label><input type="text" id="j4"></div>
<div class="input-box"><label>Meia 2</label><input type="text" id="j5"></div>
<div class="input-box"><label>Meia 3</label><input type="text" id="j6"></div>

<div class="input-box"><label>Lateral Esquerdo</label><input type="text" id="j7"></div>
<div class="input-box"><label>Zagueiro 1</label><input type="text" id="j8"></div>
<div class="input-box"><label>Zagueiro 2</label><input type="text" id="j9"></div>
<div class="input-box"><label>Lateral Direito</label><input type="text" id="j10"></div>

<div class="input-box"><label>Goleiro</label><input type="text" id="j11"></div>

<div class="input-box">
<label>Modo do Time</label>

<select id="mode">

<option>Iniciante</option>
<option>Competitivo</option>
<option>Elite</option>
<option>Galáctico</option>

</select>

</div>

<button onclick="createTeam()">
⚡ GERAR TIME
</button>

<div class="result" id="result">

<h3 id="resultTitle"></h3>

<p id="resultText"></p>

<div class="overall" id="overall"></div>

<div class="stars" id="stars"></div>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<h2>🏟 Escalação em Campo</h2>

<div class="field">

<div class="mid-line"></div>
<div class="center-circle"></div>

<div class="team-name" id="displayTeam">
SEU TIME
</div>

<div class="player p1" id="p1">🎯<span>ATA</span></div>
<div class="player p2" id="p2">⚡<span>PE</span></div>
<div class="player p3" id="p3">⚡<span>PD</span></div>

<div class="player p4" id="p4">🧠<span>MC</span></div>
<div class="player p5" id="p5">🧠<span>MC</span></div>
<div class="player p6" id="p6">🧠<span>MC</span></div>

<div class="player p7" id="p7">🛡<span>LE</span></div>
<div class="player p8" id="p8">🛡<span>ZAG</span></div>
<div class="player p9" id="p9">🛡<span>ZAG</span></div>
<div class="player p10" id="p10">🛡<span>LD</span></div>

<div class="player p11" id="p11">🧤<span>GK</span></div>

</div>

</div>

</div>

</div>

<footer>
⚽ Super Simulador • HTML + CSS + JavaScript
</footer>

<script>

function createTeam(){

    let teamName = document.getElementById('teamName').value;

    if(teamName === ''){
        alert('Digite o nome do time!');
        return;
    }

    document.getElementById('displayTeam').innerHTML = teamName;

    for(let i = 1; i <= 11; i++){

        let player = document.getElementById('j' + i).value;

        if(player === ''){
            alert('Preencha todos os jogadores!');
            return;
        }

        document.getElementById('p' + i).innerHTML =
        player;
    }

    let mode =
    document.getElementById('mode').value;

    let overall = 0;
    let stars = '';

    if(mode === 'Iniciante'){
        overall = 63;
        stars = '⭐';
    }

    if(mode === 'Competitivo'){
        overall = 81;
        stars = '⭐⭐⭐';
    }

    if(mode === 'Elite'){
        overall = 92;
        stars = '⭐⭐⭐⭐';
    }

    if(mode === 'Galáctico'){
        overall = 99;
        stars = '⭐⭐⭐⭐⭐';
    }

    let stories = [

        'Seu time conquistou a Libertadores 🏆',
        'Seu elenco ficou invicto na temporada 🔥',
        'Seu goleiro virou lenda do clube 🧤',
        'Seu ataque marcou mais de 100 gols ⚽',
        'Seu time dominou o futebol mundial 🌍',
        'Seu elenco virou o mais temido do planeta 😈'

    ];

    let randomStory =
    stories[Math.floor(Math.random() * stories.length)];

    document.getElementById('result').style.display = 'block';

    document.getElementById('resultTitle').innerHTML =
    '🔥 ' + teamName;

    document.getElementById('resultText').innerHTML =
    randomStory;

    document.getElementById('overall').innerHTML =
    overall + ' OVERALL';

    document.getElementById('stars').innerHTML =
    stars;

}

</script>

</body>
</html>
