<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TORNEIO DAS SELEÇÕES</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow-x:hidden;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;

    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426,#0f172a);
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:65px;
    color:#facc15;
    text-shadow:0 0 25px #facc15;
}

header p{
    margin-top:15px;
    color:#cbd5e1;
    font-size:18px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1700px;
    margin:auto;
    padding-bottom:50px;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:400px 1fr;
    gap:25px;
}

@media(max-width:1200px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:35px;
    padding:25px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* TÍTULOS */

.card h2{
    margin-bottom:20px;
    color:#38bdf8;
    font-size:30px;
}

/* TIMES */

.team{
    background:#0f172a;
    border-radius:20px;
    padding:18px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    transition:0.3s;
    border:2px solid transparent;
}

.team:hover{
    transform:scale(1.03);
    border:2px solid #38bdf8;
}

.team-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.flag{
    font-size:40px;
}

.team-name{
    font-size:22px;
    font-weight:bold;
}

/* BOTÃO */

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    margin-top:15px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* CAMPO */

.field{
    position:relative;
    width:100%;
    height:850px;
    border-radius:40px;
    overflow:hidden;
    border:6px solid white;

    background:
    repeating-linear-gradient(
        to bottom,
        #16a34a 0px,
        #16a34a 90px,
        #15803d 90px,
        #15803d 180px
    );
}

/* TORCIDA */

.crowd{
    position:absolute;
    width:100%;
    top:0;
    background:#111827;
    padding:12px;
    text-align:center;
    font-size:32px;
    letter-spacing:10px;
}

/* PLACAR */

.scoreboard{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    background:#020617dd;
    padding:18px 40px;
    border-radius:20px;
    font-size:38px;
    color:#facc15;
    font-weight:bold;
    border:2px solid rgba(255,255,255,0.1);
}

/* TIMES EM CAMPO */

.team-left,
.team-right{

    position:absolute;
    top:220px;
    width:320px;
    text-align:center;

}

.team-left{
    left:80px;
}

.team-right{
    right:80px;
}

.big-flag{
    font-size:140px;
}

.big-name{
    font-size:38px;
    margin-top:10px;
    font-weight:bold;
}

/* VS */

.vs{
    position:absolute;
    top:320px;
    left:50%;
    transform:translateX(-50%);
    font-size:80px;
    font-family:'Orbitron',sans-serif;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

/* RESULTADO */

.result{
    position:absolute;
    bottom:80px;
    width:100%;
    text-align:center;
}

.result h3{
    font-size:55px;
    color:#facc15;
}

.result p{
    margin-top:10px;
    color:#e2e8f0;
    font-size:20px;
}

/* TROFÉU */

.trophy{
    font-size:120px;
    animation:float 2s infinite alternate;
}

@keyframes float{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-15px);
    }

}

/* BRILHO */

.glow{
    animation:glow 1s infinite alternate;
}

@keyframes glow{

    from{
        filter:drop-shadow(0 0 5px #fff);
    }

    to{
        filter:drop-shadow(0 0 25px #facc15);
    }

}

</style>

</head>

<body>

<header>

<h1>🏆 TORNEIO DAS SELEÇÕES</h1>

<p>
Brasil, Marrocos, Haiti e Escócia disputando o maior torneio do mundo.
</p>

</header>

<div class="container">

<div class="grid">

<!-- MENU -->

<div class="card">

<h2>🌍 Seleções</h2>

<div class="team">

<div class="team-info">

<div class="flag">🇧🇷</div>

<div class="team-name">
Brasil
</div>

</div>

<div>⭐ 99</div>

</div>

<div class="team">

<div class="team-info">

<div class="flag">🇲🇦</div>

<div class="team-name">
Marrocos
</div>

</div>

<div>⭐ 90</div>

</div>

<div class="team">

<div class="team-info">

<div class="flag">🇭🇹</div>

<div class="team-name">
Haiti
</div>

</div>

<div>⭐ 82</div>

</div>

<div class="team">

<div class="team-info">

<div class="flag">🏴</div>

<div class="team-name">
Escócia
</div>

</div>

<div>⭐ 88</div>

</div>

<button onclick="simulateMatch()">
⚽ SIMULAR PARTIDA
</button>

<button onclick="nextMatch()">
🔥 PRÓXIMA PARTIDA
</button>

</div>

<!-- CAMPO -->

<div class="card">

<div class="field">

<div class="crowd">
🎉 ⚽ 🏆 🔥 🥁 ⚽ 🎉
</div>

<div class="scoreboard" id="scoreboard">
0 X 0
</div>

<!-- TIME ESQUERDA -->

<div class="team-left">

<div class="big-flag glow" id="flag1">
🇧🇷
</div>

<div class="big-name" id="team1">
Brasil
</div>

</div>

<!-- TIME DIREITA -->

<div class="team-right">

<div class="big-flag glow" id="flag2">
🇲🇦
</div>

<div class="big-name" id="team2">
Marrocos
</div>

</div>

<div class="vs">
VS
</div>

<!-- RESULTADO -->

<div class="result">

<div class="trophy" id="trophy">
🏆
</div>

<h3 id="winner">
AGUARDANDO PARTIDA
</h3>

<p id="text">
Clique em SIMULAR PARTIDA
</p>

</div>

</div>

</div>

</div>

</div>

<script>

/* TIMES */

const teams = [

{
    name:'Brasil',
    flag:'🇧🇷'
},

{
    name:'Marrocos',
    flag:'🇲🇦'
},

{
    name:'Haiti',
    flag:'🇭🇹'
},

{
    name:'Escócia',
    flag:'🏴'
}

];

let current1 = 0;
let current2 = 1;

/* SIMULAR */

function simulateMatch(){

    let score1 =
    Math.floor(Math.random()*6);

    let score2 =
    Math.floor(Math.random()*6);

    document.getElementById('scoreboard')
    .innerHTML =
    score1 + ' X ' + score2;

    let winner = '';

    if(score1 > score2){

        winner =
        teams[current1].name + ' VENCEU!';

        document.getElementById('trophy')
        .innerHTML = '🏆';

    }

    else if(score2 > score1){

        winner =
        teams[current2].name + ' VENCEU!';

        document.getElementById('trophy')
        .innerHTML = '🏆';

    }

    else{

        winner =
        'EMPATE HISTÓRICO';

        document.getElementById('trophy')
        .innerHTML = '⚽';

    }

    document.getElementById('winner')
    .innerHTML = winner;

    document.getElementById('text')
    .innerHTML =
    'A torcida enlouqueceu com essa partida épica da Copa do Mundo.';

}

/* TROCAR PARTIDA */

function nextMatch(){

    current1 =
    Math.floor(Math.random()*teams.length);

    current2 =
    Math.floor(Math.random()*teams.length);

    while(current1 === current2){

        current2 =
        Math.floor(Math.random()*teams.length);

    }

    document.getElementById('flag1')
    .innerHTML =
    teams[current1].flag;

    document.getElementById('team1')
    .innerHTML =
    teams[current1].name;

    document.getElementById('flag2')
    .innerHTML =
    teams[current2].flag;

    document.getElementById('team2')
    .innerHTML =
    teams[current2].name;

    document.getElementById('scoreboard')
    .innerHTML = '0 X 0';

    document.getElementById('winner')
    .innerHTML =
    'NOVA PARTIDA';

    document.getElementById('text')
    .innerHTML =
    'Clique em SIMULAR PARTIDA';

}

</script>

</body>
</html>
