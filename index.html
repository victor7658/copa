<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA 2026 - TIMES E CONVOCADOS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:35px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

header p{
    color:#cbd5e1;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

/* TIMES */

.teams{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

.team{
    background:#0f172a;
    padding:14px;
    border-radius:15px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.team:hover{
    transform:scale(1.05);
    background:#111c33;
}

/* CONVOCADOS */

.squad{
    margin-top:15px;
    background:#0f172a;
    padding:15px;
    border-radius:15px;
    display:none;
}

.squad h3{
    color:#facc15;
    margin-bottom:10px;
}

.squad ul{
    list-style:none;
}

.squad li{
    padding:5px 0;
    color:#cbd5e1;
}

/* MURAL */

input, textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#0f172a;
    color:white;
    outline:none;
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    margin-top:10px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* POSTS */

.post{
    background:#0f172a;
    margin-top:10px;
    padding:15px;
    border-radius:15px;
    border-left:4px solid #facc15;
}

.post h4{
    color:#facc15;
}

.post p{
    color:#cbd5e1;
    margin-top:5px;
}

</style>

</head>

<body>

<header>

<h1>🏆 COPA 2026</h1>
<p>Clique em um país para ver os convocados (simulação)</p>

</header>

<div class="container">

<div class="card">

<!-- TIMES -->

<div class="teams">

<div class="team" onclick="showTeam('brasil')">🇧🇷 Brasil</div>
<div class="team" onclick="showTeam('marrocos')">🇲🇦 Marrocos</div>
<div class="team" onclick="showTeam('haiti')">🇭🇹 Haiti</div>
<div class="team" onclick="showTeam('escocia')">🏴 Escócia</div>

</div>

<!-- CONVOCADOS -->

<div class="squad" id="squad">

<h3 id="teamName">Convocados</h3>
<ul id="players"></ul>

</div>

<!-- MURAL -->

<h3 style="margin-top:20px;color:#38bdf8;">💬 Mural da Copa</h3>

<input type="text" id="name" placeholder="Seu nome">
<textarea id="comment" rows="3" placeholder="Escreva sua opinião..."></textarea>

<button onclick="addComment()">PUBLICAR</button>

<div id="posts"></div>

</div>

</div>

<script>

/* ELENCOS (SIMULAÇÃO 2026) */

const squads = {

brasil:{
name:"🇧🇷 Brasil (Projeção 2026)",
players:[
"Alisson (GK)",
"Marquinhos",
"Militão",
"Casemiro",
"Vinícius Jr.",
"Rodrygo",
"Endrick",
"Raphinha",
"Bruno Guimarães",
"Lucas Paquetá",
"Gabriel Jesus"
]
},

marrocos:{
name:"🇲🇦 Marrocos (Projeção 2026)",
players:[
"Bono (GK)",
"Achraf Hakimi",
"Aguerd",
"Saïss",
"Amrabat",
"Ziyech",
"En-Nesyri",
"El Khannouss",
"Ounahi",
"Abde",
"Diaz"
]
},

haiti:{
name:"🇭🇹 Haiti (Projeção 2026)",
players:[
"Placide (GK)",
"Pierrot",
"Arcus",
"Bellegarde",
"Pierre",
"Joseph",
"Louis",
"Adé",
"Jean",
"Jacques",
"Fleurant"
]
},

escocia:{
name:"🏴 Escócia (Projeção 2026)",
players:[
"Robertson",
"McTominay",
"Tierney",
"McGinn",
"Christie",
"Dykes",
"Adams",
"Ferguson",
"Ralston",
"Shankland",
"Gordon"
]
}

};

/* MOSTRAR TIME */

function showTeam(team){

let data = squads[team];

document.getElementById('squad').style.display = "block";

document.getElementById('teamName').innerText = data.name;

let list = document.getElementById('players');

list.innerHTML = "";

data.players.forEach(p =>{

let li = document.createElement("li");
li.innerText = "⚽ " + p;
list.appendChild(li);

});

}

/* MURAL */

function addComment(){

let name = document.getElementById('name').value;
let comment = document.getElementById('comment').value;

if(name === "" || comment === ""){
alert("Preencha tudo!");
return;
}

let post = document.createElement("div");
post.classList.add("post");

post.innerHTML = `
<h4>${name}</h4>
<p>${comment}</p>
`;

document.getElementById("posts").prepend(post);

document.getElementById("name").value = "";
document.getElementById("comment").value = "";

}

</script>

</body>
</html>
