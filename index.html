<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMULADOR DE TIME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617;
    color:white;
    overflow-x:hidden;
}

/* FUNDO */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#0ea5e9 0%, transparent 35%),
    radial-gradient(circle at bottom,#16a34a 0%, transparent 35%),
    #020617;
    z-index:-1;
}

/* HEADER */

header{
    padding:25px;
    text-align:center;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
    font-size:50px;
    color:#facc15;
}

header p{
    color:#ddd;
    margin-top:10px;
    font-size:18px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:40px 0;
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    padding:25px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
}

.card h2{
    color:#38bdf8;
    margin-bottom:20px;
    font-size:30px;
}

/* INPUTS */

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#ddd;
}

input, select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#0f172a;
    color:white;
    font-size:16px;
    outline:none;
}

/* BOTÃO */

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#16a34a;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    background:#15803d;
    transform:scale(1.03);
}

/* TIME */

.team-preview{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:15px;
}

.player{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
}

.player:hover{
    transform:translateY(-5px);
}

.player span{
    display:block;
    margin-top:8px;
    color:#facc15;
    font-weight:bold;
}

/* RESULTADO */

.resultado{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    background:#0f172a;
    text-align:center;
    animation:aparecer 0.5s;
}

.resultado h3{
    font-size:35px;
    margin-bottom:15px;
    color:#facc15;
}

.resultado p{
    font-size:20px;
    color:#ddd;
    line-height:1.8;
}

.score{
    margin-top:20px;
    font-size:50px;
    font-weight:bold;
    color:#38bdf8;
}

@keyframes aparecer{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* CAMPO */

.field{
    margin-top:25px;
    background:linear-gradient(#15803d,#166534);
    border-radius:25px;
    padding:30px;
    min-height:550px;
    position:relative;
    overflow:hidden;
}

.field::before{
    content:'';
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:3px;
    background:rgba(255,255,255,0.3);
}

.circle{
    position:absolute;
    top:50%;
    left:50%;
    width:120px;
    height:120px;
    border:3px solid rgba(255,255,255,0.3);
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.position{
    position:absolute;
    background:#0f172a;
    border:2px solid white;
    padding:10px;
    border-radius:15px;
    width:120px;
    text-align:center;
    font-size:14px;
}

.gk{bottom:20px;left:50%;transform:translateX(-50%);}
.z1{bottom:120px;left:15%;}
.z2{bottom:120px;right:15%;}
.mc1{top:45%;left:20%;}
.mc2{top:45%;right:20%;}
.atk{top:80px;left:50%;transform:translateX(-50%);}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    color:#aaa;
}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<h1>⚽ SIMULADOR DE TIME</h1>

<p>
Monte seu próprio time e descubra como ele se sairia em uma Copa do Mundo.
</p>

</header>

<div class="container">

<div class="grid">

<!-- LADO ESQUERDO -->

<div class="card">

<h2>🏆 Criar Seu Time</h2>

<div class="input-group">
<label>Nome do Time</label>
<input type="text" id="nomeTime" placeholder="Digite o nome do time">
</div>

<div class="input-group">
<label>Capitão</label>
<input type="text" id="capitao" placeholder="Nome do capitão">
</div>

<div class="input-group">
<label>Estilo do Time</label>
<select id="estilo">
<option>Ataque Total</option>
<option>Defensivo</option>
<option>Equilibrado</option>
<option>Contra Ataque</option>
</select>
</div>

<div class="input-group">
<label>Nível do Time</label>
<select id="nivel">
<option>Iniciante</option>
<option>Bom</option>
<option>Craque</option>
<option>Lendário</option>
</select>
</div>

<button onclick="simularTime()">
SIMULAR TIME
</button>

<div class="resultado" id="resultado" style="display:none;">

<h3 id="tituloResultado"></h3>

<p id="textoResultado"></p>

<div class="score" id="score"></div>

</div>

</div>

<!-- LADO DIREITO -->

<div class="card">

<h2>🧠 Seu Time em Campo</h2>

<div class="field">

<div class="circle"></div>

<div class="position atk" id="atk">
⚽ Atacante
</div>

<div class="position mc1" id="mc1">
🎯 Meio
</div>

<div class="position mc2" id="mc2">
🎯 Meio
</div>

<div class="position z1" id="z1">
🛡 Zagueiro
</div>

<div class="position z2" id="z2">
🛡 Zagueiro
</div>

<div class="position gk" id="gk">
🧤 Goleiro
</div>

</div>

</div>

</div>

</div>

<footer>

⚽ Simulador de Futebol • Monte seu próprio clube

</footer>

<script>

function simularTime(){

    let nomeTime = document.getElementById('nomeTime').value;
    let capitao = document.getElementById('capitao').value;
    let estilo = document.getElementById('estilo').value;
    let nivel = document.getElementById('nivel').value;

    if(nomeTime === '' || capitao === ''){

        alert('Preencha todos os campos!');
        return;
    }

    let resultado = document.getElementById('resultado');
    let tituloResultado = document.getElementById('tituloResultado');
    let textoResultado = document.getElementById('textoResultado');
    let score = document.getElementById('score');

    resultado.style.display = 'block';

    let poder = 0;

    if(nivel === 'Iniciante'){
        poder = 45;
    }

    if(nivel === 'Bom'){
        poder = 70;
    }

    if(nivel === 'Craque'){
        poder = 88;
    }

    if(nivel === 'Lendário'){
        poder = 99;
    }

    let frases = [

        'Seu time chegou até as quartas de final!',
        'Seu time foi campeão da Copa do Mundo! 🏆',
        'Seu time caiu na semifinal!',
        'Seu time virou sensação mundial 🔥',
        'Seu time ganhou todos os jogos!',
        'Seu time sofreu uma goleada 😢',
        'Seu time dominou o campeonato!'
    ];

    let fraseAleatoria =
    frases[Math.floor(Math.random() * frases.length)];

    tituloResultado.innerHTML =
    nomeTime;

    textoResultado.innerHTML =
    'Capitão: <b>' + capitao + '</b><br><br>' +
    'Estilo: <b>' + estilo + '</b><br><br>' +
    fraseAleatoria;

    score.innerHTML =
    poder + ' OVERALL';

    /* CAMPO */

    document.getElementById('atk').innerHTML =
    '⚽ ' + capitao;

    document.getElementById('mc1').innerHTML =
    '🎯 Meio';

    document.getElementById('mc2').innerHTML =
    '🎯 Meio';

    document.getElementById('z1').innerHTML =
    '🛡 Defesa';

    document.getElementById('z2').innerHTML =
    '🛡 Defesa';

    document.getElementById('gk').innerHTML =
    '🧤 Goleiro';

}

</script>

</body>
</html>
