<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA DO MUNDO INTERATIVA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

/* FUNDO */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#facc1555,transparent 35%),
    linear-gradient(135deg,#020617,#071426,#0f172a);
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* HEADER */

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:65px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

header p{
    margin-top:15px;
    color:#cbd5e1;
    font-size:18px;
}

/* LAYOUT */

.container{
    width:95%;
    max-width:1700px;
    margin:auto;
    padding-bottom:50px;
}

.grid{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:30px;
}

@media(max-width:1200px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    backdrop-filter:blur(10px);
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card h2{
    color:#38bdf8;
    margin-bottom:25px;
    font-size:30px;
}

/* INPUTS */

.input-box{
    margin-bottom:16px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
}

input,select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#0f172a;
    color:white;
    outline:none;
    font-size:15px;
}

/* BOTÃO */

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#facc15,#22c55e);
    color:#02111b;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #facc15;
}

/* CAMPO */

.field{
    position:relative;
    width:100%;
    height:950px;
    border-radius:35px;
    overflow:hidden;
    border:5px solid white;
    background:
    repeating-linear-gradient(
        to bottom,
        #16a34a 0px,
        #16a34a 90px,
        #15803d 90px,
        #15803d 180px
    );
}

/* LINHAS */

.field::before{
    content:'';
    position:absolute;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.5);
    top:50%;
}

.circle{
    position:absolute;
    width:180px;
    height:180px;
    border:4px solid rgba(255,255,255,0.5);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* TORCIDA */

.crowd{
    position:absolute;
    top:0;
    width:100%;
    height:70px;
    background:linear-gradient(90deg,#111827,#1e293b,#111827);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
    letter-spacing:8px;
}

/* JOGADORES */

.player{
    position:absolute;
    width:120px;
    padding:12px;
    background:#020617dd;
    border:2px solid rgba(255,255,255,0.2);
    border-radius:18px;
    text-align:center;
    transition:0.3s;
    font-size:13px;
}

.player:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #38bdf8;
}

/* POSIÇÕES */

.p1{top:120px;left:50%;transform:translateX(-50%);}
.p2{top:230px;left:15%;}
.p3{top:230px;right:15%;}

.p4{top:420px;left:10%;}
.p5{top:390px;left:50%;transform:translateX(-50%);}
.p6{top:420px;right:10%;}

.p7{bottom:240px;left:8%;}
.p8{bottom:210px;left:32%;}
.p9{bottom:210px;right:32%;}
.p10{bottom:240px;right:8%;}

.p11{
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

/* PLACAR */

.scoreboard{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    background:#020617dd;
    padding:14px 30px;
    border-radius:20px;
    font-size:28px;
    font-weight:bold;
    color:#facc15;
    border:2px solid rgba(255,255,255,0.1);
}

/* RESULTADO */

.result{
    margin-top:25px;
    background:#020617;
    border-radius:25px;
    padding:25px;
    display:none;
    text-align:center;
}

.result h3{
    color:#facc15;
    font-size:35px;
}

.result p{
    margin-top:15px;
    color:#cbd5e1;
    line-height:1.8;
}

.cup{
    margin-top:20px;
    font-size:80px;
    animation:float 2s infinite alternate;
}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(-10px);}
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="stars" id="stars"></div>

<header>

<h1>🏆 COPA DO MUNDO</h1>

<p>
Monte sua seleção, jogue a final e tente conquistar o mundo.
</p>

</header>

<div class="container">

<div class="grid">

<!-- PAINEL -->

<div class="card">

<h2>🌍 Criar Seleção</h2>

<div class="input-box">
<label>Nome da Seleção</label>
<input type="text" id="team" placeholder="Ex: Brasil">
</div>

<div class="input-box">
<label>País Adversário</label>

<select id="enemy">

<option>Argentina</option>
<option>França</option>
<option>Alemanha</option>
<option>Espanha</option>
<option>Portugal</option>
<option>Inglaterra</option>

</select>

</div>

<div class="input-box">
<label>Nível da Seleção</label>

<select id="power">

<option>Normal</option>
<option>Forte</option>
<option>Lendária</option>

</select>

</div>

<!-- JOGADORES -->

<div class="input-box"><input type="text" id="j1" placeholder="Atacante"></div>
<div class="input-box"><input type="text" id="j2" placeholder="Ponta Esquerda"></div>
<div class="input-box"><input type="text" id="j3" placeholder="Ponta Direita"></div>
<div class="input-box"><input type="text" id="j4" placeholder="Meio Campo"></div>
<div class="input-box"><input type="text" id="j5" placeholder="Meio Campo"></div>
<div class="input-box"><input type="text" id="j6" placeholder="Meio Campo"></div>
<div class="input-box"><input type="text" id="j7" placeholder="Lateral"></div>
<div class="input-box"><input type="text" id="j8" placeholder="Zagueiro"></div>
<div class="input-box"><input type="text" id="j9" placeholder="Zagueiro"></div>
<div class="input-box"><input type="text" id="j10" placeholder="Lateral"></div>
<div class="input-box"><input type="text" id="j11" placeholder="Goleiro"></div>

<button onclick="playMatch()">
⚽ JOGAR FINAL DA COPA
</button>

<div class="result" id="result">

<h3 id="title"></h3>

<p id="text"></p>

<div class="cup" id="cup"></div>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<h2>🏟 FINAL DA COPA</h2>

<div class="field">

<div class="crowd">
🎉 🎺 ⚽ 🔥 🥁 🏆 🎉 ⚽
</div>

<div class="scoreboard" id="scoreboard">
0 X 0
</div>

<div class="circle"></div>

<div class="player p1" id="p1">⚽ ATA</div>
<div class="player p2" id="p2">⚡ PE</div>
<div class="player p3" id="p3">⚡ PD</div>

<div class="player p4" id="p4">🎯 MC</div>
<div class="player p5" id="p5">🎯 MC</div>
<div class="player p6" id="p6">🎯 MC</div>

<div class="player p7" id="p7">🛡 LE</div>
<div class="player p8" id="p8">🛡 ZAG</div>
<div class="player p9" id="p9">🛡 ZAG</div>
<div class="player p10" id="p10">🛡 LD</div>

<div class="player p11" id="p11">🧤 GK</div>

</div>

</div>

</div>

</div>

<footer>
🏆 Simulador Criativo da Copa do Mundo
</footer>

<script>

/* ESTRELAS */

for(let i = 0; i < 120; i++){

    let star = document.createElement('div');

    star.classList.add('star');

    star.style.top = Math.random() * 100 + '%';
    star.style.left = Math.random() * 100 + '%';

    star.style.animationDuration =
    (Math.random() * 3 + 1) + 's';

    document.getElementById('stars').appendChild(star);
}

/* JOGO */

function playMatch(){

    let team =
    document.getElementById('team').value;

    if(team === ''){

        alert('Digite o nome da seleção!');
        return;
    }

    for(let i = 1; i <= 11; i++){

        let player =
        document.getElementById('j' + i).value;

        if(player === ''){

            alert('Preencha todos os jogadores!');
            return;
        }

        document.getElementById('p' + i).innerHTML =
        player;
    }

    let enemy =
    document.getElementById('enemy').value;

    let power =
    document.getElementById('power').value;

    let goals = 0;

    if(power === 'Normal'){
        goals = Math.floor(Math.random() * 3);
    }

    if(power === 'Forte'){
        goals = Math.floor(Math.random() * 5);
    }

    if(power === 'Lendária'){
        goals = Math.floor(Math.random() * 7) + 1;
    }

    let enemyGoals =
    Math.floor(Math.random() * 5);

    document.getElementById('scoreboard').innerHTML =
    goals + ' X ' + enemyGoals;

    document.getElementById('result').style.display =
    'block';

    if(goals > enemyGoals){

        document.getElementById('title').innerHTML =
        '🏆 ' + team + ' CAMPEÃO!';

        document.getElementById('text').innerHTML =
        team + ' venceu a final contra ' + enemy +
        ' e conquistou a Copa do Mundo diante de milhares de torcedores!';

        document.getElementById('cup').innerHTML =
        '🏆';

    }

    else if(goals === enemyGoals){

        document.getElementById('title').innerHTML =
        '😱 JOGO HISTÓRICO';

        document.getElementById('text').innerHTML =
        'A final terminou empatada! A torcida ficou sem acreditar no drama da decisão.';

        document.getElementById('cup').innerHTML =
        '⚽';

    }

    else{

        document.getElementById('title').innerHTML =
        '💔 DERROTA';

        document.getElementById('text').innerHTML =
        enemy + ' venceu a final da Copa do Mundo.';

        document.getElementById('cup').innerHTML =
        '😭';

    }

}

</script>

</body>
</html>
