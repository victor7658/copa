header p{

.field{
    position:relative;

    max-width:900px;
    height:1200px;
    margin:30px auto;
    background:url('https://i.imgur.com/F7DhI8T.png') center/cover no-repeat;
}

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    text-align:center;
}

.player img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:6px solid #00b140;
    object-fit:cover;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.player h2{
    margin-top:8px;
    color:#1d4fa3;
    font-size:1.4rem;
}

.coach{
    text-align:center;
    font-size:2rem;
    color:#1d4fa3;
    font-weight:700;
    margin-bottom:40px;
}

@media(max-width:900px){

.field{
    height:900px;
}

.player img{
    width:80px;
    height:80px;
}

.player h2{

}

header h1{

}

header p{

}

}
