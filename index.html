<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleções - Time VS Time</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1000px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:40px;
}

.jogo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    padding:20px;
    margin:20px 0;
    border-radius:15px;
    transition:0.3s;
}

.jogo:hover{
    transform:scale(1.02);
    background:rgba(255,255,255,0.15);
}

.time{
    width:40%;
    text-align:center;
}

.time img{
    width:120px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
    border:3px solid white;
}

.time h2{
    font-size:28px;
}

.vs{
    font-size:40px;
    font-weight:bold;
    color:yellow;
}

.info{
    text-align:center;
    margin-top:10px;
    font-size:18px;
    color:#ddd;
}

@media(max-width:700px){
    .jogo{
        flex-direction:column;
        gap:20px;
    }

    .time{
        width:100%;
    }

    .vs{
        font-size:35px;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>⚽ SELEÇÕES - TIME VS TIME ⚽</h1>

<div class="jogo">

<div class="time">
<img src="https://flagcdn.com/w320/br.png">
<h2>Brasil</h2>
</div>

<div class="vs">VS</div>

<div class="time">
<img src="https://flagcdn.com/w320/ar.png">
<h2>Argentina</h2>
</div>

</div>

<div class="info">
📅 Copa 2026 - Grande Clássico Sul-Americano
</div>

<div class="jogo">

<div class="time">
<img src="https://flagcdn.com/w320/fr.png">
<h2>França</h2>
</div>

<div class="vs">VS</div>

<div class="time">
<img src="https://flagcdn.com/w320/de.png">
<h2>Alemanha</h2>
</div>

</div>

<div class="info">
🔥 Confronto Europeu
</div>

<div class="jogo">

<div class="time">
<img src="https://flagcdn.com/w320/pt.png">
<h2>Portugal</h2>
</div>

<div class="vs">VS</div>

<div class="time">
<img src="https://flagcdn.com/w320/es.png">
<h2>Espanha</h2>
</div>

</div>

<div class="info">
🏆 Jogo Internacional
</div>

</div>

</body>
</html>
