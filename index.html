<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMULADOR DE TIME 11 JOGADORES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617;
    color:white;
    overflow-x:hidden;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#0ea5e9 0%, transparent 35%),
    radial-gradient(circle at bottom,#16a34a 0%, transparent 35%),
    #020617;
    z-index:-1;
}

/* HEADER */

header{
    text-align:center;
    padding:30px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

header h1{
    font-size:55px;
    color:#facc15;
}

header p{
    margin-top:10px;
    color:#ddd;
    font-size:18px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1600px;
    margin:auto;
    padding:40px 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

@media(max-width:1100px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.card h2{
    color:#38bdf8;
    margin-bottom:25px;
    font-size:30px;
}

/* INPUTS */

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#ddd;
}

input, select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#16a34a;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
}

button:hover{
    background:#15803d;
    transform:scale(1.02);
}

/* CAMPO */

.field{
    position:relative;
    width:100%;
    height:900px;
    background:linear-gradient(#16a34a,#166534);
    border-radius:25px;
    border:5px solid white;
    overflow:hidden;
}

.field::before{
    content:'';
    position:absolute;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.4);
    top:50%;
    left:0;
}

.circle{
    position:absolute;
    width:150px;
    height:150px;
    border:4px solid rgba(255,255,255,0.4);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

/* JOGADORES */

.player{
    position:absolute;
    width:120px;
    padding:10px;
    background:#0f172a;
    border:2px solid white;
    border-radius:16px;
    text-align:center;
    font-size:13px;
    transition:0.3s;
}

.player:hover{
    transform:scale(1.05);
}

/* POSIÇÕES */

/* ATAQUE */

.p1{top:40px;left:50%;transform:translateX(-50%);}
.p2{top:130px;left:18%;}
.p3{top:130px;right:18%;}

/* MEIO */

.p4{top:320px;left:10%;}
.p5{top:300px;left:50%;transform:translateX(-50%);}
.p6{top:320px;right:10%;}

/* DEFESA */

.p7{bottom:240px;left:8%;}
.p8{bottom:220px;left:32%;}
.p9{bottom:220px;right:32%;}
.p10{bottom:240px;right:8%;}

/* GOLEIRO */

.p11{
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

/* RESULTADO */

.resultado{
    margin-top:25px;
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    text-align:center;
    display:none;
}

.resultado h3{
    font-size:35px;
    color:#facc15;
    margin-bottom:15px;
}

.resultado p{
    color:#ddd;
    line-height:1.8;
    font-size:18px;
}

.overall{
    margin-top:20px;
    font-size:55px;
    color:#38bdf8;
    font-weight:bold;
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    color:#aaa;
}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<h1>⚽ MONTE SEU TIME</h1>

<p>
Crie seu próprio time com 11 jogadores e veja se ele seria campeão.
</p>

</header>

<div class="container">

<div class="grid">

<!-- PAINEL -->

<div class="card">

<h2>🏆 Escalação</h2>

<div class="input-group">
<label>Nome do Time</label>
<input type="text" id="nomeTime" placeholder="Digite o nome do time">
</div>

<!-- 11 JOGADORES -->

<div class="input-group">
<label>Atacante</label>
<input type="text" id="j1" placeholder="Nome">
</div>

<div class="input-group">
<label>Ponta Esquerda</label>
<input type="text" id="j2" placeholder="Nome">
</div>

<div class="input-group">
<label>Ponta Direita</label>
<input type="text" id="j3" placeholder="Nome">
</div>

<div class="input-group">
<label>Meio Campo 1</label>
<input type="text" id="j4" placeholder="Nome">
</div>

<div class="input-group">
<label>Meio Campo 2</label>
<input type="text" id="j5" placeholder="Nome">
</div>

<div class="input-group">
<label>Meio Campo 3</label>
<input type="text" id="j6" placeholder="Nome">
</div>

<div class="input-group">
<label>Lateral Esquerdo</label>
<input type="text" id="j7" placeholder="Nome">
</div>

<div class="input-group">
<label>Zagueiro 1</label>
<input type="text" id="j8" placeholder="Nome">
</div>

<div class="input-group">
<label>Zagueiro 2</label>
<input type="text" id="j9" placeholder="Nome">
</div>

<div class="input-group">
<label>Lateral Direito</label>
<input type="text" id="j10" placeholder="Nome">
</div>

<div class="input-group">
<label>Goleiro</label>
<input type="text" id="j11" placeholder="Nome">
</div>

<div class="input-group">
<label>Nível do Time</label>

<select id="nivel">
<option>Fraco</option>
<option>Bom</option>
<option>Craque</option>
<option>Lendário</option>
</select>

</div>

<button onclick="criarTime()">
CRIAR TIME
</button>

<div class="resultado" id="resultado">

<h3 id="tituloResultado"></h3>

<p id="textoResultado"></p>

<div class="overall" id="overall"></div>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<h2>🧠 Seu Time em Campo</h2>

<div class="field">

<div class="circle"></div>

<div class="player p1" id="p1">⚽ ATA</div>
<div class="player p2" id="p2">⚡ PE</div>
<div class="player p3" id="p3">⚡ PD</div>

<div class="player p4" id="p4">🎯 MC</div>
<div class="player p5" id="p5">🎯 MC</div>
<div class="player p6" id="p6">🎯 MC</div>

<div class="player p7" id="p7">🛡 LE</div>
<div class="player p8" id="p8">🛡 ZAG</div>
<div class="player p9" id="p9">🛡 ZAG</div>
<div class="player p10" id="p10">🛡 LD</div>

<div class="player p11" id="p11">🧤 GK</div>

</div>

</div>

</div>

</div>

<footer>
⚽ Simulador de Futebol • Time dos Sonhos
</footer>

<script>

function criarTime(){

    let nomeTime =
    document.getElementById('nomeTime').value;

    if(nomeTime === ''){

        alert('Digite o nome do time!');
        return;
    }

    for(let i = 1; i <= 11; i++){

        let nome =
        document.getElementById('j' + i).value;

        if(nome === ''){

            alert('Preencha todos os jogadores!');
            return;
        }

        document.getElementById('p' + i).innerHTML =
        nome;
    }

    let nivel =
    document.getElementById('nivel').value;

    let overall = 0;

    if(nivel === 'Fraco'){
        overall = 58;
    }

    if(nivel === 'Bom'){
        overall = 76;
    }

    if(nivel === 'Craque'){
        overall = 91;
    }

    if(nivel === 'Lendário'){
        overall = 99;
    }

    let frases = [

        'Seu time ganhou a Champions League 🏆',
        'Seu time foi campeão mundial 🌍',
        'Seu time perdeu na semifinal 😢',
        'Seu time virou sensação do futebol 🔥',
        'Seu time venceu todos os jogos ⚽',
        'Seu time fez história no futebol!'
    ];

    let frase =
    frases[Math.floor(Math.random() * frases.length)];

    document.getElementById('resultado').style.display =
    'block';

    document.getElementById('tituloResultado').innerHTML =
    nomeTime;

    document.getElementById('textoResultado').innerHTML =
    frase;

    document.getElementById('overall').innerHTML =
    overall + ' OVERALL';

}

</script>

</body>
</html>
