<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa 2026 Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#071f07;
    color:white;
}

/* HEADER */

header{
    background:linear-gradient(90deg,#006400,#00aa44);
    padding:25px;
    text-align:center;
}

header h1{
    color:#ffdf00;
    font-size:3rem;
}

header p{
    margin-top:10px;
}

/* MENU */

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.team-btn{
    padding:14px 24px;
    border:none;
    border-radius:15px;
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.team-btn:hover{
    transform:scale(1.08);
}

.active{
    background:white !important;
    color:black !important;
    border:3px solid #ffdf00;
}

/* CORES */

.brasil{background:#009933;}
.argentina{background:#3ea6ff;}
.franca{background:#003cff;}
.portugal{background:#c40000;}

/* ÁREA PRINCIPAL */

.main{
    width:95%;
    max-width:1500px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

/* CAMPO */

.field{
    position:relative;
    height:850px;
    border-radius:25px;
    overflow:hidden;
    border:6px solid white;
    background:url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1400&auto=format&fit=crop') center/cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

/* JOGADORES */

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.player:hover{
    transform:translate(-50%,-50%) scale(1.1);
}

.shirt{
    width:90px;
    height:90px;
    border-radius:20px;
    background:#ffdf00;
    border:4px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    font-weight:700;
    color:#006400;
    margin:auto;
}

.player h3{
    margin-top:8px;
    font-size:1rem;
}

.player p{
    font-size:0.8rem;
    color:#ddd;
}

/* PAINEL */

.panel{
    background:rgba(255,255,255,0.1);
    border-radius:25px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(6px);
}

.panel h2{
    color:#ffdf00;
    margin-bottom:15px;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    display:block;
    margin-bottom:5px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.save-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ffdf00;
    color:#006400;
    font-weight:700;
    cursor:pointer;
    font-size:1rem;
}

/* GOLS */

.goals{
    margin-top:20px;
}

.goal-card{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

/* RESPONSIVO */

@media(max-width:1000px){

.main{
    grid-template-columns:1fr;
}

.field{
    height:1200px;
}

.shirt{
    width:70px;
    height:70px;
    font-size:1rem;
}

header h1{
    font-size:2rem;
}

}

</style>
</head>
<body>

<header>
    <h1>COPA DO MUNDO 2026</h1>
    <p>Editor Completo de Escalação</p>
</header>

<!-- MENU -->

<div class="menu">

<button class="team-btn brasil active"
onclick="showTeam('brasil',this)">
Brasil
</button>

<button class="team-btn argentina"
onclick="showTeam('argentina',this)">
Argentina
</button>

<button class="team-btn franca"
onclick="showTeam('franca',this)">
França
</button>

<button class="team-btn portugal"
onclick="showTeam('portugal',this)">
Portugal
</button>

</div>

<!-- CONTEÚDO -->

<div class="main">

<!-- CAMPO -->

<div class="field">

<div class="overlay"></div>

<div id="players"></div>

</div>

<!-- PAINEL -->

<div class="panel">

<h2>Editar Jogador</h2>

<div class="input-box">
<label>Nome do Jogador</label>
<input type="text" id="playerName">
</div>

<div class="input-box">
<label>Número da Camisa</label>
<input type="number" id="playerNumber">
</div>

<button class="save-btn" onclick="savePlayer()">
Salvar Alterações
</button>

<!-- GOLS -->

<div class="goals">

<h2 style="margin-top:25px;">Gols na Copa</h2>

<div class="goal-card">
⚽ Mbappé - 6 gols
</div>

<div class="goal-card">
⚽ Messi - 5 gols
</div>

<div class="goal-card">
⚽ Vini Jr - 4 gols
</div>

<div class="goal-card">
⚽ Cristiano Ronaldo - 3 gols
</div>

</div>

</div>

</div>

<script>

let currentTeam = "brasil";
let selectedPlayer = null;

const teams = {

brasil:[

{num:1,name:"Alisson",pos:"Goleiro",top:"88%",left:"50%"},

{num:4,name:"Marquinhos",pos:"Zagueiro",top:"70%",left:"35%"},
{num:3,name:"Militao",pos:"Zagueiro",top:"70%",left:"65%"},

{num:6,name:"Arana",pos:"Lateral",top:"60%",left:"15%"},
{num:2,name:"Danilo",pos:"Lateral",top:"60%",left:"85%"},

{num:5,name:"Casemiro",pos:"Volante",top:"48%",left:"50%"},

{num:8,name:"Paqueta",pos:"Meia",top:"38%",left:"35%"},
{num:10,name:"Rodrygo",pos:"Meia",top:"38%",left:"65%"},

{num:11,name:"Vini Jr",pos:"Ponta",top:"18%",left:"20%"},
{num:9,name:"Endrick",pos:"Atacante",top:"10%",left:"50%"},
{num:7,name:"Raphinha",pos:"Ponta",top:"18%",left:"80%"}

],

argentina:[

{num:10,name:"Messi",pos:"Atacante",top:"10%",left:"50%"},
{num:9,name:"Julian Alvarez",pos:"Ponta",top:"18%",left:"80%"},
{num:1,name:"Martinez",pos:"Goleiro",top:"88%",left:"50%"}

],

franca:[

{num:10,name:"Mbappe",pos:"Ponta",top:"18%",left:"20%"},
{num:9,name:"Giroud",pos:"Atacante",top:"10%",left:"50%"},
{num:1,name:"Maignan",pos:"Goleiro",top:"88%",left:"50%"}

],

portugal:[

{num:7,name:"Cristiano Ronaldo",pos:"Ponta",top:"18%",left:"20%"},
{num:9,name:"Ramos",pos:"Atacante",top:"10%",left:"50%"},
{num:1,name:"Diogo Costa",pos:"Goleiro",top:"88%",left:"50%"}

]

};

/* MOSTRAR TIME */

function showTeam(team,button){

currentTeam = team;

document.querySelectorAll(".team-btn").forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

renderPlayers();

}

/* RENDERIZAR */

function renderPlayers(){

const playersDiv = document.getElementById("players");

playersDiv.innerHTML = "";

teams[currentTeam].forEach((player,index)=>{

playersDiv.innerHTML += `

<div class="player"
style="top:${player.top}; left:${player.left};"
onclick="selectPlayer(${index})">

<div class="shirt">${player.num}</div>

<h3>${player.name}</h3>

<p>${player.pos}</p>

</div>

`;

});

}

/* SELECIONAR */

function selectPlayer(index){

selectedPlayer = index;

document.getElementById("playerName").value =
teams[currentTeam][index].name;

document.getElementById("playerNumber").value =
teams[currentTeam][index].num;

}

/* SALVAR */

function savePlayer(){

if(selectedPlayer === null){
alert("Escolha um jogador!");
return;
}

teams[currentTeam][selectedPlayer].name =
document.getElementById("playerName").value;

teams[currentTeam][selectedPlayer].num =
document.getElementById("playerNumber").value;

renderPlayers();

}

/* INICIAR */

renderPlayers();

</script>

</body>
</html>
