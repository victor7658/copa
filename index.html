<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ffd500;
    overflow-x:hidden;
}

/* TOPO */

header{
    text-align:center;
    padding:30px 20px;
}

header h1{
    font-size:5rem;
    color:#009c3b;
}

header p{
    font-size:2rem;
    color:#1d4fa3;
    font-weight:700;
}

/* MENU */

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.team-btn{
    padding:14px 25px;
    border:none;
    border-radius:15px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    color:white;
}

.team-btn:hover{
    transform:scale(1.08);
}

/* CORES */

.brasil{background:#009c3b;}
.argentina{background:#3ea6ff;}
.franca{background:#003cff;}
.portugal{background:#c40000;}
.inglaterra{background:#555;}

/* BOTÃO ATIVO */

.team-btn.active{
    background:white !important;
    color:black !important;
    border:3px solid #ffdf00;
    transform:scale(1.08);
}

/* CAMPO */

.field{
    position:relative;
    width:95%;
    max-width:900px;
    height:1200px;
    margin:20px auto;
    background:#f5c400;
    border:8px solid white;
    border-radius:20px;
    overflow:hidden;
}

/* LINHAS */

.field::before{
    content:'';
    position:absolute;
    inset:20px;
    border:4px solid white;
}

.middle-line{
    position:absolute;
    top:50%;
    left:20px;
    width:calc(100% - 40px);
    height:4px;
    background:white;
}

.center-circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:180px;
    height:180px;
    border:4px solid white;
    border-radius:50%;
}

.goal-top{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:250px;
    height:140px;
    border:4px solid white;
}

.goal-bottom{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:250px;
    height:140px;
    border:4px solid white;
}

/* JOGADORES */

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    text-align:center;
    transition:0.3s;
}

.player:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

.player img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:6px solid #00b140;
    object-fit:cover;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.player h2{
    margin-top:8px;
    color:#1d4fa3;
    font-size:1rem;
    font-weight:700;
}

/* RESPONSIVO */

@media(max-width:900px){

.field{
    height:900px;
}

.player img{
    width:80px;
    height:80px;
}

.player h2{
    font-size:0.7rem;
}

header h1{
    font-size:3rem;
}

header p{
    font-size:1.2rem;
}

}

</style>
</head>

/* MOSTRAR TIME */

function showTeam(team,button){

team.toUpperCase();

const playersDiv =

style="top:${player.top};
left:${player.left};">

<img src="${player.img}">

`;

});
