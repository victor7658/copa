<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COPA 2026 - ESCALAÇÕES</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b1520;
    color:white;
}

/* TOPO */

header{
    text-align:center;
    padding:30px;
    background:linear-gradient(90deg,#02111f,#0f3057,#00587a);
}

header h1{
    font-size:4rem;
    color:#ffd700;
}

header p{
    margin-top:10px;
    font-size:1.2rem;
}

/* MENU */

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:20px;
}

.team-btn{
    padding:14px 22px;
    border:none;
    border-radius:15px;
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.team-btn:hover{
    transform:scale(1.08);
}

/* CORES */

.brasil{background:#009c3b;}
.argentina{background:#3ea6ff;}
.franca{background:#002fff;}
.portugal{background:#c40000;}
.inglaterra{background:#666;}
.espanha{background:#ff8800;}
.alemanha{background:#222;}
.italia{background:#0055ff;}

/* ABA ATIVA */

.team-btn.active{
    background:white !important;
    color:black !important;
    border:3px solid gold;
}

/* CAMPO */

.field{
    position:relative;
    width:95%;
    max-width:1100px;
    height:1450px;
    margin:20px auto 50px;
    background:#1d8b3f;
    border-radius:25px;
    overflow:hidden;
    border:8px solid white;
}

/* LINHAS */

.field::before{
    content:'';
    position:absolute;
    inset:20px;
    border:4px solid white;
}

.middle-line{
    position:absolute;
    top:50%;
    left:20px;
    width:calc(100% - 40px);
    height:4px;
    background:white;
}

.center-circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:180px;
    height:180px;
    border:4px solid white;
    border-radius:50%;
}

/* JOGADORES */

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    width:115px;
    height:115px;
    border-radius:50%;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:10px;
    font-size:0.85rem;
    font-weight:700;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
    transition:0.3s;
}

.player:hover{
    transform:translate(-50%,-50%) scale(1.1);
    background:#ffd700;
}

/* RESPONSIVO */

@media(max-width:900px){

.field{
    height:1700px;
}

.player{
    width:80px;
    height:80px;
    font-size:0.6rem;
}

header h1{
    font-size:2.5rem;
}

}

</style>
</head>
