<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUPER COPA - FINAL DO MUNDO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    overflow:hidden;
    color:white;
}

/* FUNDO */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#16a34a66,transparent 30%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 30%),
    linear-gradient(135deg,#020617,#071426,#0f172a);
    z-index:-3;
}

/* ESTÁDIO */

.stadium-light{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:#ffffff11;
    filter:blur(50px);
    animation:moveLight 6s infinite alternate;
}

.light1{
    top:-100px;
    left:-100px;
}

.light2{
    bottom:-100px;
    right:-100px;
}

@keyframes moveLight{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(40px);
    }

}

/* HEADER */

header{
    text-align:center;
    padding:20px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#facc15;
    text-shadow:0 0 25px #facc15;
}

header p{
    margin-top:10px;
    color:#cbd5e1;
}

/* LAYOUT */

.container{
    width:95%;
    max-width:1500px;
    margin:auto;
    display:grid;
    grid-template-columns:360px 1fr;
    gap:25px;
}

@media(max-width:1100px){

    .container{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    border-radius:30px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.card h2{
    color:#38bdf8;
    margin-bottom:20px;
}

/* INPUTS */

.input-box{
    margin-bottom:16px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

input,select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#0f172a;
    color:white;
    outline:none;
}

/* BOTÕES */

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    margin-top:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.start{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.shoot{
    background:linear-gradient(90deg,#facc15,#f59e0b);
    color:black;
}

button:hover{
    transform:scale(1.04);
}

/* CAMPO */

.field{
    position:relative;
    height:760px;
    border-radius:35px;
    overflow:hidden;
    border:6px solid white;

    background:
    repeating-linear-gradient(
        to bottom,
        #16a34a 0px,
        #16a34a 90px,
        #15803d 90px,
        #15803d 180px
    );
}

/* TORCIDA */

.crowd{
    position:absolute;
    top:0;
    width:100%;
    background:#111827;
    padding:12px;
    text-align:center;
    font-size:30px;
    letter-spacing:10px;
}

/* PLACAR */

.scoreboard{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    background:#020617dd;
    padding:16px 35px;
    border-radius:20px;
    font-size:32px;
    font-weight:bold;
    color:#facc15;
    border:2px solid rgba(255,255,255,0.1);
}

/* GOL */

.goal{
    position:absolute;
    top:140px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    height:220px;
    border:8px solid white;
    border-bottom:none;
}

/* GOLEIRO */

.goalkeeper{
    position:absolute;
    top:260px;
    left:50%;
    transform:translateX(-50%);
    font-size:90px;
    transition:0.4s;
    z-index:5;
}

/* BOLA */

.ball{
    position:absolute;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    font-size:45px;
    transition:0.7s;
    z-index:6;
}

/* JOGADOR */

.player{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:100px;
}

/* BOTÕES CAMPO */

.kick-controls{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
}

.kick-controls button{
    width:110px;
}

/* RESULTADO */

.result{
    margin-top:20px;
    background:#0f172a;
    padding:20px;
    border-radius:20px;
    text-align:center;
    display:none;
}

.result h3{
    font-size:30px;
    color:#facc15;
}

.result p{
    margin-top:10px;
    color:#cbd5e1;
}

.trophy{
    margin-top:15px;
    font-size:70px;
    animation:float 1.5s infinite alternate;
}

@keyframes float{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-12px);
    }

}

/* POWER BAR */

.power-area{
    margin-top:25px;
}

.power-bar{
    width:100%;
    height:22px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

.power{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
    transition:0.2s;
}

/* CHANCE */

.chance{
    margin-top:10px;
    text-align:center;
    color:#cbd5e1;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="stadium-light light1"></div>
<div class="stadium-light light2"></div>

<header>

<h1>🏆 SUPER COPA</h1>

<p>
Disputa de pênaltis da Final da Copa do Mundo
</p>

</header>

<div class="container">

<!-- MENU -->

<div class="card">

<h2>⚽ FINAL</h2>

<div class="input-box">
<label>Sua Seleção</label>
<input type="text" id="team" placeholder="Brasil">
</div>

<div class="input-box">
<label>Adversário</label>

<select id="enemy">

<option>Argentina</option>
<option>França</option>
<option>Portugal</option>
<option>Espanha</option>
<option>Alemanha</option>

</select>

</div>

<button class="start" onclick="startGame()">
🔥 COMEÇAR PARTIDA
</button>

<div class="power-area">

<h2>💥 FORÇA DO CHUTE</h2>

<div class="power-bar">
<div class="power" id="power"></div>
</div>

<div class="chance" id="chance">
Clique em CHUTAR para parar a barra
</div>

</div>

<button class="shoot" onclick="shoot()">
⚽ CHUTAR
</button>

<div class="result" id="result">

<h3 id="title"></h3>

<p id="text"></p>

<div class="trophy" id="trophy"></div>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<div class="field">

<div class="crowd">
🎉 ⚽ 🥁 🏆 🔥 ⚽ 🎉
</div>

<div class="scoreboard" id="score">
0 X 0
</div>

<div class="goal"></div>

<div class="goalkeeper" id="keeper">
🧤
</div>

<div class="ball" id="ball">
⚽
</div>

<div class="player">
🧍
</div>

<div class="kick-controls">

<button onclick="setDirection('left')">
⬅
</button>

<button onclick="setDirection('center')">
⬆
</button>

<button onclick="setDirection('right')">
➡
</button>

</div>

</div>

</div>

</div>

<script>

let direction = 'center';

let playerGoals = 0;
let enemyGoals = 0;

let rounds = 0;

let power = 0;
let increasing = true;

let gameStarted = false;

/* POWER BAR */

setInterval(() => {

    if(!gameStarted) return;

    if(increasing){

        power += 2;

        if(power >= 100){
            increasing = false;
        }

    }else{

        power -= 2;

        if(power <= 0){
            increasing = true;
        }

    }

    document.getElementById('power').style.width =
    power + '%';

},30);

/* DIREÇÃO */

function setDirection(dir){

    direction = dir;

    document.getElementById('chance').innerHTML =
    'Direção escolhida: ' + dir.toUpperCase();

}

/* COMEÇAR */

function startGame(){

    playerGoals = 0;
    enemyGoals = 0;
    rounds = 0;

    gameStarted = true;

    document.getElementById('score').innerHTML =
    '0 X 0';

    document.getElementById('result').style.display =
    'none';

    resetBall();

}

/* RESET */

function resetBall(){

    let ball =
    document.getElementById('ball');

    ball.style.left = '50%';
    ball.style.bottom = '140px';

}

/* CHUTE */

function shoot(){

    if(!gameStarted){

        alert('Comece a partida!');
        return;
    }

    if(rounds >= 5){

        finishGame();
        return;
    }

    let keeper =
    document.getElementById('keeper');

    let ball =
    document.getElementById('ball');

    let keeperMove =
    ['left','center','right']
    [Math.floor(Math.random()*3)];

    keeper.style.left = '50%';

    if(keeperMove === 'left'){
        keeper.style.left = '35%';
    }

    if(keeperMove === 'right'){
        keeper.style.left = '65%';
    }

    ball.style.bottom = '520px';

    if(direction === 'left'){
        ball.style.left = '35%';
    }

    if(direction === 'right'){
        ball.style.left = '65%';
    }

    if(direction === 'center'){
        ball.style.left = '50%';
    }

    setTimeout(() => {

        let precision = power;

        if(direction !== keeperMove && precision > 25){

            playerGoals++;

            showMessage(
            '⚽ GOOOOOL!',
            'Chute perfeito no canto!'
            );

        }

        else if(precision < 25){

            showMessage(
            '😵 ERROU!',
            'Você chutou muito fraco!'
            );

        }

        else{

            showMessage(
            '🧤 DEFENDEU!',
            'O goleiro pegou!'
            );

        }

        /* ADVERSÁRIO */

        let enemyChance =
        Math.random();

        if(enemyChance > 0.45){

            enemyGoals++;

        }

        rounds++;

        document.getElementById('score').innerHTML =
        playerGoals + ' X ' + enemyGoals;

        resetBall();

        if(rounds >= 5){

            finishGame();

        }

    },800);

}

/* RESULTADO */

function showMessage(title,text){

    document.getElementById('result').style.display =
    'block';

    document.getElementById('title').innerHTML =
    title;

    document.getElementById('text').innerHTML =
    text;

}

/* FINAL */

function finishGame(){

    let team =
    document.getElementById('team').value || 'Seu Time';

    let enemy =
    document.getElementById('enemy').value;

    if(playerGoals > enemyGoals){

        showMessage(
        '🏆 CAMPEÃO DO MUNDO!',
        team + ' venceu ' + enemy +
        ' na final da Copa do Mundo!'
        );

        document.getElementById('trophy').innerHTML =
        '🏆';

    }

    else if(playerGoals < enemyGoals){

        showMessage(
        '💔 DERROTA',
        enemy + ' venceu a disputa de pênaltis.'
        );

        document.getElementById('trophy').innerHTML =
        '😭';

    }

    else{

        showMessage(
        '😱 EMPATE',
        'A final terminou empatada!'
        );

        document.getElementById('trophy').innerHTML =
        '⚽';

    }

    gameStarted = false;

}

</script>

</body>
</html>
