<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b3d0b;
    color:white;
}

/* TOPO */

header{
    background:linear-gradient(90deg,#006400,#009933);
    padding:25px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

header h1{
    font-size:3rem;
    color:#ffdf00;
}

header p{
    margin-top:10px;
}

/* MENU DOS TIMES */

.menu{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    padding:25px;
}

/* BOTÕES */

.team-btn{
    padding:14px 24px;
    border:none;
    border-radius:14px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* CORES DOS TIMES */

.brasil{
    background:#009933;
}

.argentina{
    background:#3da5ff;
}

.franca{
    background:#003cff;
}

.portugal{
    background:#c40000;
}

.inglaterra{
    background:#777;
}

/* BOTÃO ATIVO */

.team-btn.active{
    background:white !important;
    color:black !important;
    transform:scale(1.08);
    border:3px solid #ffdf00;
}

/* HOVER */

.team-btn:hover{
    transform:scale(1.06);
}

/* CAMPO */

.field{
    width:95%;
    max-width:1300px;
    height:850px;
    margin:20px auto;
    position:relative;
    border:6px solid white;
    border-radius:25px;
    overflow:hidden;
    background:url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1400&auto=format&fit=crop') center/cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.35);
}

/* JOGADORES */

.player{
    position:absolute;
    transform:translate(-50%,-50%);
    text-align:center;
    transition:0.3s;
}

.player:hover{
    transform:translate(-50%,-50%) scale(1.1);
}

.shirt{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffdf00;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    color:#006400;
    font-weight:700;
    border:4px solid white;
    margin:auto;
}

.player h3{
    margin-top:8px;
    font-size:1rem;
}

.player p{
    font-size:0.8rem;
    color:#ddd;
}

/* RESPONSIVO */

@media(max-width:900px){

    .field{
        height:1200px;
    }

    .shirt{
        width:70px;
        height:70px;
        font-size:1rem;
    }

    header h1{
        font-size:2rem;
    }

}

</style>
</head>
<body>

<header>
    <h1>COPA DO MUNDO 2026</h1>
    <p>Escolha um time para ver a escalação</p>
</header>

<!-- MENU -->

<div class="menu">

<button class="team-btn brasil active" onclick="showTeam('brasil', this)">Brasil</button>

<button class="team-btn argentina" onclick="showTeam('argentina', this)">Argentina</button>

<button class="team-btn franca" onclick="showTeam('franca', this)">França</button>

<button class="team-btn portugal" onclick="showTeam('portugal', this)">Portugal</button>

<button class="team-btn inglaterra" onclick="showTeam('inglaterra', this)">Inglaterra</button>

</div>

<!-- CAMPO -->

<div class="field">

<div class="overlay"></div>

<div id="players"></div>

</div>

<script>

const teams = {

brasil:[
{num:1,name:"Alisson",pos:"Goleiro",top:"90%",left:"50%"},
{num:4,name:"Marquinhos",pos:"Zagueiro",top:"72%",left:"35%"},
{num:3,name:"Militão",pos:"Zagueiro",top:"72%",left:"65%"},
{num:6,name:"Arana",pos:"Lateral",top:"65%",left:"15%"},
{num:2,name:"Danilo",pos:"Lateral",top:"65%",left:"85%"},
{num:5,name:"Casemiro",pos:"Volante",top:"50%",left:"30%"},
{num:8,name:"Paquetá",pos:"Meia",top:"45%",left:"50%"},
{num:10,name:"Rodrygo",pos:"Meia",top:"50%",left:"70%"},
{num:11,name:"Vini Jr",pos:"Ponta",top:"25%",left:"20%"},
{num:9,name:"Endrick",pos:"Atacante",top:"18%",left:"50%"},
{num:7,name:"Raphinha",pos:"Ponta",top:"25%",left:"80%"}
],

argentina:[
{num:1,name:"Martinez",pos:"Goleiro",top:"90%",left:"50%"},
{num:10,name:"Messi",pos:"Atacante",top:"18%",left:"50%"},
{num:9,name:"Julian Alvarez",pos:"Ponta",top:"25%",left:"80%"}
],

franca:[
{num:1,name:"Maignan",pos:"Goleiro",top:"90%",left:"50%"},
{num:10,name:"Mbappé",pos:"Ponta",top:"25%",left:"20%"},
{num:9,name:"Giroud",pos:"Atacante",top:"18%",left:"50%"}
],

portugal:[
{num:1,name:"Diogo Costa",pos:"Goleiro",top:"90%",left:"50%"},
{num:7,name:"Cristiano",pos:"Ponta",top:"25%",left:"20%"},
{num:9,name:"Ramos",pos:"Atacante",top:"18%",left:"50%"}
],

inglaterra:[
{num:1,name:"Pickford",pos:"Goleiro",top:"90%",left:"50%"},
{num:10,name:"Foden",pos:"Meia",top:"50%",left:"70%"},
{num:9,name:"Kane",pos:"Atacante",top:"18%",left:"50%"}
]

};

function showTeam(team,element){

const playersDiv = document.getElementById("players");

playersDiv.innerHTML = "";

/* REMOVE BOTÃO ATIVO */

document.querySelectorAll(".team-btn").forEach(btn=>{
    btn.classList.remove("active");
});

/* ADICIONA BOTÃO ATIVO */

element.classList.add("active");

/* MOSTRA JOGADORES */

teams[team].forEach(player => {

playersDiv.innerHTML += `

<div class="player" style="top:${player.top}; left:${player.left};">

<div class="shirt">${player.num}</div>

<h3>${player.name}</h3>

<p>${player.pos}</p>

</div>

`;

});

}

/* ABRE BRASIL AUTOMÁTICO */

showTeam('brasil', document.querySelector('.brasil'));

</script>

</body>
</html>
