<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA 2026 - CONFRONTOS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:white;
overflow-x:hidden;
}

/* FUNDO */

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:
radial-gradient(circle at top,#16a34a55,transparent 35%),
radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
text-align:center;
padding:40px 20px;
}

header h1{
font-family:'Orbitron',sans-serif;
font-size:55px;
color:#facc15;
text-shadow:0 0 25px #facc15;
}

/* CONTAINER */

.container{
width:95%;
max-width:1000px;
margin:auto;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:#0f172a;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

th{
background:#16a34a;
padding:18px;
font-size:22px;
}

td{
padding:25px;
text-align:center;
font-size:24px;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

tr:hover td{
background:#111c33;
}

/* VS */

.vs{
color:#facc15;
padding:0 10px;
}

/* MURAL */

.mural{
margin-top:50px;
}

.mural h2{
color:#38bdf8;
margin-bottom:15px;
}

input,
textarea{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:16px;
outline:none;
}

textarea{
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

/* POSTS */

.post{
background:#0f172a;
padding:15px;
border-radius:14px;
margin-top:15px;
border-left:5px solid #facc15;
animation:show 0.4s ease;
}

.post h4{
color:#facc15;
margin-bottom:5px;
}

.post p{
color:#cbd5e1;
}

@keyframes show{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* RESPONSIVO */

@media(max-width:700px){

header h1{
font-size:35px;
}

td{
font-size:18px;
padding:18px;
}

th{
font-size:18px;
}

}

</style>
</head>

<body>

<header>
<h1>🏆 COPA 2026 — CONFRONTOS</h1>
</header>

<div class="container">

<table>

<tr>
<th>JOGO</th>
<th>CONFRONTO</th>
</tr>

<tr>
<td>1</td>
<td>
🇧🇷 BRASIL
<span class="vs">VS</span>
🇲🇦 MARROCOS
</td>
</tr>

<tr>
<td>2</td>
<td>
🇭🇹 HAITI
<span class="vs">VS</span>
🏴 ESCÓCIA
</td>
</tr>

</table>

<div class="mural">

<h2>💬 Mural da Copa</h2>

<input type="text" id="name" placeholder="Seu nome">

<textarea id="comment" rows="4" placeholder="Escreva sua opinião..."></textarea>

<button onclick="addComment()">PUBLICAR</button>

<div id="posts"></div>

</div>

</div>

<script>

function addComment(){

let name = document.getElementById("name").value;
let comment = document.getElementById("comment").value;

if(name === "" || comment === ""){
alert("Preencha tudo!");
return;
}

let post = document.createElement("div");

post.classList.add("post");

post.innerHTML = `
<h4>${name}</h4>
<p>${comment}</p>
`;

document.getElementById("posts").prepend(post);

document.getElementById("name").value = "";
document.getElementById("comment").value = "";

}

</script>

</body>
</html>
