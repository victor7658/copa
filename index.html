<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIMULADOR DE TIME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617;
    color:white;
    overflow-x:hidden;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#0ea5e9 0%, transparent 35%),
    radial-gradient(circle at bottom,#16a34a 0%, transparent 35%),
    #020617;
    z-index:-1;
}

/* HEADER */

header{
    text-align:center;
    padding:30px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

header h1{
    font-size:55px;
    color:#facc15;
}

header p{
    color:#ddd;
    margin-top:10px;
    font-size:18px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:40px 0;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* CARD */

.card{
    background:rgba(255,255,255,0.05);
    border-radius:25px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.card h2{
    margin-bottom:25px;
    color:#38bdf8;
    font-size:32px;
}

/* INPUTS */

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#ddd;
}

input, select{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#16a34a;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#15803d;
    transform:scale(1.02);
}

/* CAMPO */

.field{
    position:relative;
    width:100%;
    min-height:650px;
    border-radius:25px;
    background:linear-gradient(#16a34a,#166534);
    overflow:hidden;
    border:5px solid white;
}

.field::before{
    content:'';
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    height:4px;
    background:rgba(255,255,255,0.4);
}

.circle{
    position:absolute;
    top:50%;
    left:50%;
    width:130px;
    height:130px;
    border:4px solid rgba(255,255,255,0.4);
    border-radius:50%;
    transform:translate(-50%,-50%);
}

/* POSIÇÕES */

.player{
    position:absolute;
    width:120px;
    padding:10px;
    border-radius:16px;
    text-align:center;
    background:#0f172a;
    border:2px solid white;
    font-size:14px;
    transition:0.3s;
}

.player:hover{
    transform:scale(1.05);
}

.atk{
    top:50px;
    left:50%;
    transform:translateX(-50%);
}

.mc1{
    top:220px;
    left:15%;
}

.mc2{
    top:220px;
    right:15%;
}

.def1{
    bottom:140px;
    left:20%;
}

.def2{
    bottom:140px;
    right:20%;
}

.gk{
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
}

/* RESULTADO */

.resultado{
    margin-top:25px;
    background:#0f172a;
    padding:25px;
    border-radius:20px;
    text-align:center;
    display:none;
}

.resultado h3{
    color:#facc15;
    font-size:35px;
    margin-bottom:15px;
}

.resultado p{
    color:#ddd;
    line-height:1.8;
    font-size:18px;
}

.overall{
    margin-top:20px;
    font-size:50px;
    color:#38bdf8;
    font-weight:bold;
}

/* FOOTER */

footer{
    text-align:center;
    padding:40px;
    color:#aaa;
}

</style>

</head>

<body>

<div class="bg"></div>

<header>

<h1>⚽ MONTE SEU TIME</h1>

<p>
Escolha os jogadores e descubra se seu time seria campeão.
</p>

</header>

<div class="container">

<div class="grid">

<!-- PAINEL -->

<div class="card">

<h2>🏆 Criador de Time</h2>

<div class="input-group">
<label>Nome do Time</label>
<input type="text" id="nomeTime" placeholder="Digite o nome do time">
</div>

<div class="input-group">
<label>Atacante</label>
<input type="text" id="atkInput" placeholder="Nome do atacante">
</div>

<div class="input-group">
<label>Meio Campo 1</label>
<input type="text" id="mc1Input" placeholder="Nome do meio campo">
</div>

<div class="input-group">
<label>Meio Campo 2</label>
<input type="text" id="mc2Input" placeholder="Nome do meio campo">
</div>

<div class="input-group">
<label>Zagueiro 1</label>
<input type="text" id="def1Input" placeholder="Nome do zagueiro">
</div>

<div class="input-group">
<label>Zagueiro 2</label>
<input type="text" id="def2Input" placeholder="Nome do zagueiro">
</div>

<div class="input-group">
<label>Goleiro</label>
<input type="text" id="gkInput" placeholder="Nome do goleiro">
</div>

<div class="input-group">
<label>Nível do Time</label>
<select id="nivel">
<option>Fraco</option>
<option>Bom</option>
<option>Craque</option>
<option>Lendário</option>
</select>
</div>

<button onclick="criarTime()">
CRIAR TIME
</button>

<div class="resultado" id="resultado">

<h3 id="tituloResultado"></h3>

<p id="textoResultado"></p>

<div class="overall" id="overall"></div>

</div>

</div>

<!-- CAMPO -->

<div class="card">

<h2>🧠 Seu Time em Campo</h2>

<div class="field">

<div class="circle"></div>

<div class="player atk" id="atk">
⚽ Atacante
</div>

<div class="player mc1" id="mc1">
🎯 Meio
</div>

<div class="player mc2" id="mc2">
🎯 Meio
</div>

<div class="player def1" id="def1">
🛡 Defesa
</div>

<div class="player def2" id="def2">
🛡 Defesa
</div>

<div class="player gk" id="gk">
🧤 Goleiro
</div>

</div>

</div>

</div>

</div>

<footer>
⚽ Simulador de Futebol • Monte seu próprio esquadrão
</footer>

<script>

function criarTime(){

    let nomeTime = document.getElementById('nomeTime').value;

    let atk = document.getElementById('atkInput').value;
    let mc1 = document.getElementById('mc1Input').value;
    let mc2 = document.getElementById('mc2Input').value;
    let def1 = document.getElementById('def1Input').value;
    let def2 = document.getElementById('def2Input').value;
    let gk = document.getElementById('gkInput').value;

    let nivel = document.getElementById('nivel').value;

    if(
        nomeTime === '' ||
        atk === '' ||
        mc1 === '' ||
        mc2 === '' ||
        def1 === '' ||
        def2 === '' ||
        gk === ''
    ){

        alert('Preencha todos os jogadores!');
        return;
    }

    /* COLOCAR NO CAMPO */

    document.getElementById('atk').innerHTML =
    '⚽ ' + atk;

    document.getElementById('mc1').innerHTML =
    '🎯 ' + mc1;

    document.getElementById('mc2').innerHTML =
    '🎯 ' + mc2;

    document.getElementById('def1').innerHTML =
    '🛡 ' + def1;

    document.getElementById('def2').innerHTML =
    '🛡 ' + def2;

    document.getElementById('gk').innerHTML =
    '🧤 ' + gk;

    /* RESULTADO */

    let overall = 0;

    if(nivel === 'Fraco'){
        overall = 50;
    }

    if(nivel === 'Bom'){
        overall = 75;
    }

    if(nivel === 'Craque'){
        overall = 90;
    }

    if(nivel === 'Lendário'){
        overall = 99;
    }

    let frases = [

        'Seu time chegou na semifinal! 🔥',
        'Seu time foi campeão da Copa 🏆',
        'Seu time perdeu nos pênaltis 😢',
        'Seu time dominou o campeonato ⚽',
        'Seu time virou sensação mundial 🌍',
        'Seu time ganhou todos os jogos!'
    ];

    let frase =
    frases[Math.floor(Math.random() * frases.length)];

    document.getElementById('resultado').style.display =
    'block';

    document.getElementById('tituloResultado').innerHTML =
    nomeTime;

    document.getElementById('textoResultado').innerHTML =
    frase;

    document.getElementById('overall').innerHTML =
    overall + ' OVERALL';

}

</script>

</body>
</html>
