<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COPA 2026 - ELENCOS SCROLL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#020617;
    color:white;
}

/* FUNDO */

body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background:
    radial-gradient(circle at top,#16a34a55,transparent 35%),
    radial-gradient(circle at bottom,#0ea5e955,transparent 35%),
    linear-gradient(135deg,#020617,#071426);
}

/* HEADER */

header{
    text-align:center;
    padding:35px;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:55px;
    color:#facc15;
    text-shadow:0 0 20px #facc15;
}

/* TIMES */

.container{
    width:95%;
    max-width:1000px;
    margin:auto;
}

.teams{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.team{
    background:#0f172a;
    padding:14px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.team:hover{
    transform:scale(1.05);
    background:#111c33;
}

/* OVERLAY */

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    z-index:5;
}

/* MODAL */

.modal{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:650px;
    height:70vh;
    background:#0f172a;
    border-radius:20px;
    display:none;
    z-index:10;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    overflow:hidden;
}

/* HEADER MODAL */

.modal-header{
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.modal-header h2{
    color:#38bdf8;
}

.close{
    cursor:pointer;
    font-size:22px;
    color:#facc15;
}

/* LISTA SCROLL */

.players{
    height:100%;
    overflow-y:auto;
    padding:15px;
}

/* SCROLL BONITO */

.players::-webkit-scrollbar{
    width:8px;
}

.players::-webkit-scrollbar-thumb{
    background:#22c55e;
    border-radius:10px;
}

/* ITEM */

.player{
    padding:10px;
    margin-bottom:8px;
    background:#111827;
    border-radius:12px;
}

/* MURAL */

.mural{
    margin-top:30px;
}

input, textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#0f172a;
    color:white;
    margin-top:10px;
    outline:none;
    resize:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    margin-top:10px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.post{
    background:#0f172a;
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    border-left:4px solid #facc15;
}

.post h4{
    color:#facc15;
}

.post p{
    color:#cbd5e1;
}

</style>

</head>

<body>

<header>
<h1>🏆 COPA 2026 - ELENCOS</h1>
</header>

<div class="container">

<div class="teams">

<div class="team" onclick="openTeam('brasil')">🇧🇷 Brasil</div>
<div class="team" onclick="openTeam('marrocos')">🇲🇦 Marrocos</div>
<div class="team" onclick="openTeam('haiti')">🇭🇹 Haiti</div>
<div class="team" onclick="openTeam('escocia')">🏴 Escócia</div>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeTeam()"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-header">

<h2 id="teamName">Elenco</h2>
<div class="close" onclick="closeTeam()">✖</div>

</div>

<div class="players" id="players">

<!-- jogadores aqui -->

</div>

</div>

<!-- MURAL -->

<div class="mural">

<h2 style="color:#38bdf8;margin-top:20px;">💬 Mural da Copa</h2>

<input type="text" id="name" placeholder="Seu nome">
<textarea id="comment" rows="3" placeholder="Sua opinião..."></textarea>

<button onclick="addComment()">PUBLICAR</button>

<div id="posts"></div>

</div>

</div>

<script>

/* ELENCOS */

const squads = {

brasil:{
name:"🇧🇷 Brasil - Convocados 2026",
players:[

"Goleiros",
"Alisson (Liverpool)",
"Ederson (Fenerbahçe)",
"Weverton (Grêmio)",

"Defensores",
"Alex Sandro (Flamengo)",
"Bremer (Juventus)",
"Danilo (Flamengo)",
"Douglas Santos (Zenit)",
"Gabriel Magalhães (Arsenal)",
"Ibañez (Al-Ahli)",
"Léo Pereira (Flamengo)",
"Marquinhos (PSG)",
"Wesley (Roma)",

"Meio-campistas",
"Bruno Guimarães (Newcastle)",
"Casemiro (Manchester United)",
"Danilo Santos (Botafogo)",
"Fabinho (Al-Ittihad)",
"Lucas Paquetá (Flamengo)",

"Atacantes",
"Endrick (Lyon)",
"Gabriel Martinelli (Arsenal)",
"Igor Thiago (Brentford)",
"Luiz Henrique (Zenit)",
"Matheus Cunha (Manchester United)",
"Neymar (Santos)",
"Raphinha (Barcelona)",
"Rayan (Bournemouth)"

]
},

marrocos:{
name:"🇲🇦 Marrocos",
players:[
"Bono (GK)","Hakimi","Ziyech","Amrabat","En-Nesyri",
"El Khannouss","Ounahi","Saiss","Abde","Diaz"
]
},

haiti:{
name:"🇭🇹 Haiti",
players:[
"Placide","Pierrot","Joseph","Jean","Louis","Fleurant"
]
},

escocia:{
name:"🏴 Escócia",
players:[
"Robertson","McTominay","Tierney","McGinn","Adams","Gordon"
]
}

};

/* ABRIR */

function openTeam(team){

document.getElementById('modal').style.display = "block";
document.getElementById('overlay').style.display = "block";

document.getElementById('teamName').innerText =
squads[team].name;

let box = document.getElementById('players');
box.innerHTML = "";

/* cria lista com scroll */

squads[team].players.forEach(p =>{

let div = document.createElement("div");
div.classList.add("player");
div.innerText = "⚽ " + p;
box.appendChild(div);

});

}

/* FECHAR */

function closeTeam(){

document.getElementById('modal').style.display = "none";
document.getElementById('overlay').style.display = "none";

}

/* MURAL */

function addComment(){

let name = document.getElementById('name').value;
let comment = document.getElementById('comment').value;

if(name === "" || comment === ""){
alert("Preencha tudo!");
return;
}

let post = document.createElement("div");
post.classList.add("post");

post.innerHTML = `
<h4>${name}</h4>
<p>${comment}</p>
`;

document.getElementById("posts").prepend(post);

document.getElementById("name").value = "";
document.getElementById("comment").value = "";

}

</script>

</body>
</html>
